<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enjoy Padel Botoșani</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: white;
      background: black;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
      text-align: center;
      background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
        url('./hero.png') center/cover no-repeat;
    }

    /* SOCIAL */
    .socials {
      position: absolute;
      top: 15px;
      right: 20px;
      display: flex;
      gap: 12px;
    }

    .socials a {
      text-decoration: none;
      font-size: 20px;
      color: white;
      opacity: 0.8;
    }

    .socials a:hover {
      opacity: 1;
    }

    h1 {
      font-size: 42px;
      margin: 20px 0 5px;
      color: #22c55e;
      font-weight: 800;
    }

    .sub {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 3px;
    }

    .tagline {
      margin-top: 25px;
      font-size: 22px;
      font-weight: 600;
    }

    .btn {
      margin-top: 25px;
      font-size: 22px;
      padding: 16px 32px;
      border: none;
      border-radius: 12px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(34,197,94,0.4);
    }

    .subtext {
      margin-top: 12px;
      font-size: 14px;
      max-width: 300px;
      opacity: 0.85;
    }

    .card {
      margin-top: 30px;
      padding: 16px;
      border-radius: 15px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      width: 260px;
    }

    .big {
      font-size: 34px;
      color: #22c55e;
      font-weight: 800;
    }

    .title {
      margin-top: 5px;
      font-size: 20px;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 16px;
      opacity: 0.9;
    }

  </style>
</head>

<body>

<div class="hero">

  <!-- SOCIAL ICONS -->
  <div class="socials">
    <a href="https://instagram.com" target="_blank">📸</a>
    <a href="https://facebook.com" target="_blank">📘</a>
    <a href="https://tiktok.com" target="_blank">🎵</a>
  </div>

  <h1>ENJOY PADEL</h1>
  <div class="sub">BOTOSANI</div>

  <div class="tagline">Descoperă fenomenul PADEL.</div>

  <a href="https://playtomic.io/" target="_blank" class="btn">
    REZERVĂ TEREN
  </a>

  <div class="subtext">
    Vei fi redirecționat către PlayTomic, cea mai mare aplicație de PADEL din lume,
    pentru a-ți face rezervarea.
  </div>

  <div class="card">
    <div class="big">2</div>
    <div class="title">terenuri outdoor</div>
  </div>

  <div class="card">
    <div class="title">Program NON-STOP</div>
    <div class="subtitle">Acces self-service, intri și joci oricând.</div>
  </div>

</div>

</body>
</html>
