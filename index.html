<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enjoy Padel Botoșani</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    :root {
      --accent: #22c55e;
      --accent-glow: rgba(34,197,94,0.35);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.82);
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: #000;
    }

    body {
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.85)),
        url('./hero.png') center/cover no-repeat;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 20px;
      text-align: center;
      position: relative;
    }

    .socials {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 10px;
    }

    .social-btn {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: rgba(20,20,20,0.7);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .content {
      width: 100%;
      max-width: 880px;
      margin-top: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
    }

    h1 {
      margin: 0;
      font-size: 86px;
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(180deg, #ffffff 0%, #d1d5db 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sub {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      position: relative;
      padding-bottom: 12px;
    }

    .sub::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 5px;
      background: var(--accent);
      border-radius: 999px;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .tagline {
      font-size: 32px;
      font-weight: 600;
    }

    .btn {
      padding: 20px 42px;
      border-radius: 999px;
      background: linear-gradient(180deg, #34d399, #22c55e);
      font-size: 28px;
      font-weight: 800;
      text-decoration: none;
      color: white;
      box-shadow: 0 14px 30px var(--accent-glow);
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px var(--accent-glow);
    }

    .subtext {
      font-size: 17px;
      max-width: 650px;
      color: var(--muted);
    }

    .meta-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }

    .meta-card {
      padding: 18px 26px;
      border-radius: 22px;
      background: rgba(20,20,20,0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .big-number {
      font-size: 50px;
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
    }

    .meta-title {
      font-size: 22px;
      font-weight: 700;
    }

    .meta-sub {
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 640px){
      h1 { font-size: 48px; }
      .tagline { font-size: 20px; }
      .btn { width: 100%; font-size: 22px; }
    }

  </style>
</head>

<body>
  <div class="hero">

    <div class="socials">
      <a class="social-btn" href="#"><svg viewBox="0 0 24 24"><path d="M13.5 22v-8h2.7l.4-3.2h-3.1V8.8c0-.9.3-1.5 1.6-1.5h1.7V4.4c-.3 0-1.3-.1-2.5-.1-2.5 0-4.2 1.5-4.2 4.3v2.2H7.8V14h2.8v8h2.9z"/></svg></a>
      <a class="social-btn" href="#"><svg viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5z"/></svg></a>
    </div>

    <div class="content">
      <h1>ENJOY PADEL</h1>
      <div class="sub">BOTOȘANI</div>

      <div class="tagline">Descoperă fenomenul PADEL.</div>

      <a href="https://playtomic.io/" target="_blank" class="btn">
        REZERVĂ TEREN!
      </a>

      <div class="subtext">
        Vei fi redirecționat către Playtomic, cea mai mare aplicație de padel din lume, pentru a-ți face rezervarea.
      </div>

      <div class="meta-row">
        <div class="meta-card">
          <div class="big-number">2</div>
          <div class="meta-title">terenuri outdoor</div>
        </div>

        <div class="meta-card">
          <div>
            <div class="meta-title">Program NON-STOP</div>
            <div class="meta-sub">Acces self-service, intri și joci când vrei.</div>
          </div>
        </div>
      </div>

    </div>

  </div>
</body>
</html>
