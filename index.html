<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Padel Club Botoșani</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    :root{
      --accent:#22c55e;
      --accent-dark:#16a34a;
      --text:#ffffff;
      --muted:rgba(255,255,255,0.86);
      --card-bg:rgba(7,12,20,0.46);
      --card-border:rgba(255,255,255,0.10);
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: #000;
    }

    body{
      background:
        linear-gradient(rgba(0,0,0,0.46), rgba(0,0,0,0.74)),
        url('./hero.png') center/cover no-repeat;
    }

    .hero{
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 34px 24px 20px;
      text-align: center;
      position: relative;
    }

    .socials{
      position: absolute;
      top: 16px;
      right: 20px;
      display: flex;
      gap: 12px;
    }

    .social-btn{
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: #1f1d22;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .social-btn svg{
      width: 24px;
      height: 24px;
      fill: #fff;
    }

    .content{
      max-width: 1000px;
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    h1{
      margin: 0;
      font-size: 82px;
      font-weight: 800;
      color: var(--accent);
    }

    .sub{
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.24em;
    }

    .tagline{
      font-size: 34px;
      font-weight: 600;
    }

    .btn{
      min-width: 360px;
      padding: 20px 40px;
      border-radius: 20px;
      background: linear-gradient(#34d399, var(--accent));
      color: white;
      font-size: 30px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 12px 28px rgba(34,197,94,0.35);
    }

    .subtext{
      font-size: 18px;
      max-width: 600px;
      color: var(--muted);
    }

    .meta-row{
      margin-top: 20px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .meta-card{
      padding: 14px 18px;
      border-radius: 18px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .big-number{
      font-size: 50px; /* 🔥 aici e highlight */
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }

    .meta-title{
      font-size: 22px;
      font-weight: 700;
    }

    .meta-sub{
      font-size: 16px;
      color: var(--muted);
    }

    @media (max-width: 900px){
      h1{font-size:58px;}
      .tagline{font-size:24px;}
      .btn{font-size:22px; min-width:0; width:100%;}
      .meta-row{flex-direction:column;}
      .meta-card{justify-content:center;}
      .big-number{font-size:40px;}
    }

  </style>
</head>

<body>

<div class="hero">

  <div class="socials">
    <a class="social-btn" href="https://facebook.com" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M13.5 22v-8h2.7l.4-3.2h-3.1V8.8c0-.9.3-1.5 1.6-1.5h1.7V4.4c-.3 0-1.3-.1-2.5-.1-2.5 0-4.2 1.5-4.2 4.3v2.2H7.8V14h2.8v8h2.9z"/></svg>
    </a>
    <a class="social-btn" href="https://instagram.com" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm0 2.2A2.8 2.8 0 0 0 4.2 7v10A2.8 2.8 0 0 0 7 19.8h10a2.8 2.8 0 0 0 2.8-2.8V7A2.8 2.8 0 0 0 17 4.2H7zm10.25 1.65a1.1 1.1 0 1 1 0 2.2 1.1 1.1 0 0 1 0-2.2zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2.2a2.8 2.8 0 1 0 0 5.6 2.8 2.8 0 0 0 0-5.6z"/></svg>
    </a>
    <a class="social-btn" href="https://tiktok.com" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M14.2 3c.3 2.1 1.5 3.7 3.5 4.6.8.4 1.7.6 2.3.6v3.1c-1.4 0-2.7-.3-4-.9v6.2c0 3.3-2.6 5.7-6 5.7-3.2 0-5.8-2.4-5.8-5.6 0-3.4 2.8-5.9 6.2-5.6v3.1a2.6 2.6 0 1 0 2.6 2.6V3h1.2z"/></svg>
    </a>
  </div>

  <div class="content">
    <h1>PADEL CLUB</h1>
    <div class="sub">BOTOȘANI</div>

    <div class="tagline">Descoperă fenomenul PADEL.</div>

    <a href="https://playtomic.io/" target="_blank" class="btn">
      REZERVĂ TEREN
    </a>

    <div class="subtext">
      Vei fi redirecționat către PlayTomic, cea mai mare aplicație de PADEL din lume,
      pentru a-ți face rezervarea.
    </div>

    <div class="meta-row">
      <div class="meta-card">
        <div class="big-number">2</div>
        <div class="meta-title">terenuri outdoor</div>
      </div>

      <div class="meta-card">
        <div>
          <div class="meta-title">Program NON-STOP</div>
          <div class="meta-sub">Acces self-service, intri și joci oricând.</div>
        </div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
