<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enjoy Padel Botoșani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --green:#22d864;
      --green-dark:#16a34a;
      --white:#ffffff;
      --muted:rgba(255,255,255,0.88);
      --soft:rgba(255,255,255,0.74);
      --panel:rgba(7,10,10,0.34);
      --panel-border:rgba(255,255,255,0.08);
      --shadow:0 18px 40px rgba(0,0,0,0.28);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--white);
      background:#000;
    }

    body{
      background:
        linear-gradient(180deg, rgba(0,0,0,0.40) 0%, rgba(0,0,0,0.58) 40%, rgba(0,0,0,0.76) 100%),
        url('./hero.png') center/cover no-repeat fixed;
    }

    .hero{
      min-height:100vh;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 28px 40px;
    }

    .socials{
      position:absolute;
      top:18px;
      right:22px;
      display:flex;
      gap:12px;
      z-index:3;
    }

    .social-btn{
      width:52px;
      height:52px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:14px;
      background:rgba(25,24,28,0.88);
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 10px 24px rgba(0,0,0,0.22);
      transition:transform .2s ease, background .2s ease;
    }

    .social-btn:hover{
      transform:translateY(-2px);
      background:rgba(35,34,40,0.96);
    }

    .social-btn svg{
      width:28px;
      height:28px;
      fill:#fff;
      display:block;
    }

    .content{
      width:min(100%, 720px);
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      padding:34px 28px 28px;
      border-radius:30px;
      background:linear-gradient(180deg, rgba(0,0,0,0.14), rgba(0,0,0,0.18));
      backdrop-filter:blur(2px);
    }

    .brand-main{
      margin:0;
      font-size:clamp(54px, 5vw, 86px);
      line-height:0.95;
      font-weight:800;
      color:var(--green);
      letter-spacing:0.015em;
      text-transform:uppercase;
      text-shadow:0 8px 30px rgba(0,0,0,0.18);
    }

    .brand-sub{
      margin-top:10px;
      font-size:clamp(24px, 2vw, 34px);
      font-weight:700;
      letter-spacing:0.28em;
      text-transform:uppercase;
    }

    .tagline{
      margin-top:28px;
      font-size:clamp(24px, 2vw, 34px);
      font-weight:600;
      color:var(--muted);
    }

    .cta{
      margin-top:28px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:320px;
      min-height:72px;
      padding:18px 36px;
      border-radius:18px;
      background:linear-gradient(180deg, #31e073 0%, var(--green) 100%);
      color:#041109;
      text-decoration:none;
      font-size:clamp(24px, 1.65vw, 28px);
      font-weight:800;
      text-transform:uppercase;
      box-shadow:0 18px 34px rgba(34,216,100,0.30);
      border:1px solid rgba(255,255,255,0.10);
      transition:transform .2s ease, box-shadow .2s ease;
    }

    .cta:hover{
      transform:translateY(-2px);
      box-shadow:0 20px 38px rgba(34,216,100,0.34);
    }

    .cta-note{
      margin-top:16px;
      max-width:560px;
      font-size:clamp(15px, 1vw, 18px);
      line-height:1.5;
      color:var(--soft);
    }

    .meta-row{
      margin-top:28px;
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      justify-content:center;
      width:100%;
    }

    .meta-card{
      min-width:240px;
      padding:14px 18px;
      border-radius:18px;
      background:var(--panel);
      border:1px solid var(--panel-border);
      backdrop-filter:blur(8px);
      box-shadow:var(--shadow);
    }

    .meta-title{
      margin:0;
      font-size:clamp(21px, 1.4vw, 24px);
      font-weight:700;
      line-height:1.2;
    }

    .meta-title .green{
      color:var(--green);
      font-size:1.25em;
      margin-right:8px;
    }

    .meta-sub{
      margin-top:5px;
      font-size:clamp(14px, 1vw, 16px);
      line-height:1.45;
      color:var(--soft);
    }

    @media (max-width: 900px){
      body{
        background-attachment:scroll;
      }

      .hero{
        align-items:flex-start;
        padding:34px 18px 26px;
      }

      .content{
        margin-top:44px;
        width:100%;
        max-width:430px;
        padding:18px 14px 18px;
        background:none;
        backdrop-filter:none;
      }

      .socials{
        top:10px;
        right:12px;
        gap:10px;
      }

      .social-btn{
        width:44px;
        height:44px;
        border-radius:12px;
      }

      .social-btn svg{
        width:24px;
        height:24px;
      }

      .brand-main{
        font-size:clamp(40px, 10vw, 56px);
      }

      .brand-sub{
        font-size:clamp(22px, 5.6vw, 28px);
        letter-spacing:0.16em;
      }

      .tagline{
        margin-top:22px;
        font-size:clamp(20px, 5.4vw, 28px);
      }

      .cta{
        min-width:0;
        width:100%;
        max-width:320px;
        min-height:64px;
        font-size:clamp(20px, 5vw, 24px);
        padding:16px 22px;
      }

      .cta-note{
        max-width:340px;
        font-size:14px;
      }

      .meta-row{
        margin-top:22px;
        gap:12px;
      }

      .meta-card{
        width:100%;
        max-width:320px;
        min-width:0;
        padding:12px 16px;
        border-radius:16px;
      }

      .meta-title{
        font-size:20px;
      }

      .meta-title .green{
        font-size:1.15em;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="socials">
      <a class="social-btn" href="https://facebook.com" target="_blank" rel="noopener" aria-label="Facebook">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 22v-8h2.7l.4-3.2h-3.1V8.8c0-.9.3-1.5 1.6-1.5h1.7V4.4c-.3 0-1.3-.1-2.5-.1-2.5 0-4.2 1.5-4.2 4.3v2.2H7.8V14h2.8v8h2.9z"/></svg>
      </a>
      <a class="social-btn" href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm0 2.2A2.8 2.8 0 0 0 4.2 7v10A2.8 2.8 0 0 0 7 19.8h10a2.8 2.8 0 0 0 2.8-2.8V7A2.8 2.8 0 0 0 17 4.2H7zm10.25 1.65a1.1 1.1 0 1 1 0 2.2 1.1 1.1 0 0 1 0-2.2zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2.2a2.8 2.8 0 1 0 0 5.6 2.8 2.8 0 0 0 0-5.6z"/></svg>
      </a>
      <a class="social-btn" href="https://tiktok.com" target="_blank" rel="noopener" aria-label="TikTok">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.2 3c.3 2.1 1.5 3.7 3.5 4.6.8.4 1.7.6 2.3.6v3.1c-1.4 0-2.7-.3-4-.9v6.2c0 3.3-2.6 5.7-6 5.7-3.2 0-5.8-2.4-5.8-5.6 0-3.4 2.8-5.9 6.2-5.6v3.1a2.6 2.6 0 1 0 2.6 2.6V3h1.2z"/></svg>
      </a>
    </div>

    <div class="content">
      <h1 class="brand-main">ENJOY PADEL</h1>
      <div class="brand-sub">BOTOSANI</div>

      <div class="tagline">Descoperă fenomenul PADEL.</div>

      <a class="cta" href="https://playtomic.io/" target="_blank" rel="noopener">
        REZERVĂ TEREN
      </a>

      <div class="cta-note">
        Vei fi redirecționat către PlayTomic, cea mai mare aplicație de PADEL din lume, pentru a-ți face rezervarea.
      </div>

      <div class="meta-row">
        <div class="meta-card">
          <p class="meta-title"><span class="green">2</span>terenuri outdoor</p>
        </div>

        <div class="meta-card">
          <p class="meta-title">Program NON-STOP</p>
          <div class="meta-sub">Acces self-service, intri și joci oricând.</div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
