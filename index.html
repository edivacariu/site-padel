<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Padel Club Botoșani</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    :root{
      --accent:#22c55e;
      --text:#ffffff;
      --muted:rgba(255,255,255,0.86);
    }

    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      color:white;
      background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
        url('./hero.png') center/cover no-repeat;
    }

    .hero{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:34px 24px 20px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    /* 🔥 LOGO BACKGROUND */
    .bg-logo{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      width:700px;
      opacity:0.08;
      filter:blur(2px);
      z-index:0;
    }

    .socials{
      position:absolute;
      top:16px;
      right:20px;
      display:flex;
      gap:12px;
      z-index:5;
    }

    .social-btn{
      width:50px;
      height:50px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      background:#1f1d22;
    }

    .social-btn svg{
      width:24px;
      height:24px;
      fill:#fff;
    }

    .content{
      max-width:1000px;
      margin-top:40px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:24px;
      z-index:2;
    }

    /* 🔥 BRAND CU LOGO MIC */
    .brand{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .brand img{
      width:60px;
    }

    h1{
      margin:0;
      font-size:70px;
      font-weight:800;
      color:var(--accent);
    }

    .sub{
      font-size:30px;
      font-weight:700;
      letter-spacing:0.2em;
    }

    .tagline{
      font-size:30px;
      font-weight:600;
    }

    .btn{
      padding:20px 40px;
      border-radius:20px;
      background:linear-gradient(#34d399, var(--accent));
      color:white;
      font-size:26px;
      font-weight:800;
      text-decoration:none;
      box-shadow:0 12px 28px rgba(34,197,94,0.35);
    }

    .subtext{
      font-size:18px;
      max-width:600px;
      color:var(--muted);
    }

    .meta-row{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .meta-card{
      padding:14px 18px;
      border-radius:18px;
      background:rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.1);
      display:flex;
      align-items:center;
      gap:10px;
    }

    .big-number{
      font-size:60px;
      font-weight:900;
      color:var(--accent);
    }

    .meta-title{
      font-size:22px;
      font-weight:700;
    }

    .meta-sub{
      font-size:16px;
      color:var(--muted);
    }

    @media (max-width:900px){
      .brand{
        flex-direction:column;
      }

      h1{font-size:48px;}
      .tagline{font-size:22px;}
      .btn{font-size:20px;}
      .bg-logo{width:400px;}
    }

  </style>
</head>

<body>

<div class="hero">

  <!-- 🔥 LOGO FUNDAL -->
  <img src="./logo.png" class="bg-logo" />

  <!-- SOCIAL -->
  <div class="socials">
    <a class="social-btn" href="https://facebook.com" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M13.5 22v-8h2.7l.4-3.2h-3.1V8.8c0-.9.3-1.5 1.6-1.5h1.7V4.4c-.3 0-1.3-.1-2.5-.1-2.5 0-4.2 1.5-4.2 4.3v2.2H7.8V14h2.8v8h2.9z"/></svg>
    </a>
    <a class="social-btn" href="https://instagram.com" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5z"/></svg>
    </a>
    <a class="social-btn" href="https://tiktok.com" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M14.2 3c.3 2.1 1.5 3.7 3.5 4.6v6.2"/></svg>
    </a>
  </div>

  <div class="content">

    <!-- 🔥 LOGO MIC + TEXT -->
    <div class="brand">
      <img src="./logo.png" />
      <h1>PADEL CLUB</h1>
    </div>

    <div class="sub">BOTOȘANI</div>

    <div class="tagline">Descoperă fenomenul PADEL.</div>

    <a href="https://playtomic.io/" target="_blank" class="btn">
      REZERVĂ TEREN
    </a>

    <div class="subtext">
      Vei fi redirecționat către PlayTomic, cea mai mare aplicație de PADEL din lume,
      pentru a-ți face rezervarea.
    </div>

    <div class="meta-row">
      <div class="meta-card">
        <div class="big-number">2</div>
        <div class="meta-title">terenuri outdoor</div>
      </div>

      <div class="meta-card">
        <div>
          <div class="meta-title">Program NON-STOP</div>
          <div class="meta-sub">Acces self-service, intri și joci oricând.</div>
        </div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
