<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enjoy Padel Botoșani</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      color:white;
      background:black;
    }

    .hero{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      align-items:center;
      padding:60px 20px 40px;
      text-align:center;
      background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
        url('./hero.png') center/cover no-repeat;
    }

    /* SOCIAL */
    .socials{
      position:absolute;
      top:15px;
      right:20px;
      display:flex;
      gap:12px;
    }

    .social-btn{
      width:48px;
      height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      background:#1e1e1e;
    }

    .social-btn svg{
      width:24px;
      height:24px;
      fill:white;
    }

    .content{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:28px;
    }

    h1{
      font-size:42px;
      margin:0;
      color:#22c55e;
      font-weight:800;
    }

    .sub{
      font-size:26px;
      font-weight:700;
      letter-spacing:3px;
    }

    .tagline{
      font-size:22px;
      font-weight:600;
    }

    .btn{
      font-size:22px;
      padding:18px 36px;
      border:none;
      border-radius:14px;
      background:#22c55e;
      color:black;
      font-weight:bold;
      text-decoration:none;
      box-shadow:0 10px 25px rgba(34,197,94,0.4);
    }

    .subtext{
      max-width:320px;
      font-size:14px;
      opacity:0.85;
    }

    .meta-row{
      margin-top:auto;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .meta-card{
      padding:14px 18px;
      border-radius:14px;
      background:rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.1);
      min-width:260px;
    }

    .meta-title{
      font-size:20px;
      font-weight:700;
    }

    .green{
      color:#22c55e;
      font-weight:800;
      margin-right:6px;
    }

    .meta-sub{
      font-size:14px;
      opacity:0.9;
      margin-top:4px;
    }

  </style>
</head>

<body>

<div class="hero">

  <!-- SOCIAL -->
  <div class="socials">
    <a class="social-btn" href="https://facebook.com" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M13.5 22v-8h2.7l.4-3.2h-3.1V8.8c0-.9.3-1.5 1.6-1.5h1.7V4.4c-.3 0-1.3-.1-2.5-.1-2.5 0-4.2 1.5-4.2 4.3v2.2H7.8V14h2.8v8h2.9z"/></svg>
    </a>

    <a class="social-btn" href="https://instagram.com" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm0 2.2A2.8 2.8 0 0 0 4.2 7v10A2.8 2.8 0 0 0 7 19.8h10a2.8 2.8 0 0 0 2.8-2.8V7A2.8 2.8 0 0 0 17 4.2H7zm10.25 1.65a1.1 1.1 0 1 1 0 2.2 1.1 1.1 0 0 1 0-2.2zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2.2a2.8 2.8 0 1 0 0 5.6 2.8 2.8 0 0 0 0-5.6z"/></svg>
    </a>

    <a class="social-btn" href="https://tiktok.com" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M14.2 3c.3 2.1 1.5 3.7 3.5 4.6.8.4 1.7.6 2.3.6v3.1c-1.4 0-2.7-.3-4-.9v6.2c0 3.3-2.6 5.7-6 5.7-3.2 0-5.8-2.4-5.8-5.6 0-3.4 2.8-5.9 6.2-5.6v3.1a2.6 2.6 0 1 0 2.6 2.6V3h1.2z"/></svg>
    </a>
  </div>

  <div class="content">
    <h1>ENJOY PADEL</h1>
    <div class="sub">BOTOȘANI</div>

    <div class="tagline">Descoperă fenomenul PADEL.</div>

    <a href="https://playtomic.io/" target="_blank" class="btn">
      REZERVĂ TEREN
    </a>

    <div class="subtext">
      Vei fi redirecționat către PlayTomic, cea mai mare aplicație de PADEL din lume,
      pentru a-ți face rezervarea.
    </div>
  </div>

  <div class="meta-row">
    <div class="meta-card">
      <div class="meta-title"><span class="green">2</span>terenuri outdoor</div>
    </div>

    <div class="meta-card">
      <div class="meta-title">Program NON-STOP</div>
      <div class="meta-sub">Acces self-service, intri și joci oricând.</div>
    </div>
  </div>

</div>

</body>
</html>
