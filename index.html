<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Padel Club Botoșani</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    :root{
      --accent:#2f6fe4;
      --accent-dark:#255dc2;
      --text:#ffffff;
      --muted:rgba(255,255,255,0.86);
      --soft:rgba(255,255,255,0.74);
      --card-bg:rgba(7,12,20,0.46);
      --card-border:rgba(255,255,255,0.10);
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: #000;
    }

    body{
      background:
        linear-gradient(180deg, rgba(0,0,0,0.38) 0%, rgba(0,0,0,0.52) 35%, rgba(0,0,0,0.74) 100%),
        url('./hero.png') center/cover no-repeat;
    }

    .hero{
      min-height: 100vh;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 34px 24px 20px;
      text-align: center;
    }

    .socials{
      position: absolute;
      top: 16px;
      right: 20px;
      display: flex;
      gap: 12px;
      z-index: 5;
    }

    .social-btn{
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: #1f1d22;
      border: 1px solid rgba(255,255,255,0.08);
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.22);
      transition: transform .18s ease, background .18s ease;
    }

    .social-btn:hover{
      transform: translateY(-2px);
      background: #29262d;
    }

    .social-btn svg{
      width: 24px;
      height: 24px;
      fill: #fff;
      display: block;
    }

    .content{
      width: 100%;
      max-width: 1100px;
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand{
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    h1{
      margin: 0;
      font-size: 82px;
      line-height: 0.95;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.01em;
      text-transform: uppercase;
      text-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    .sub{
      margin: 0;
      font-size: 34px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .tagline{
      margin-top: 24px;
      font-size: 34px;
      line-height: 1.2;
      font-weight: 600;
      color: var(--text);
    }

    .cta-wrap{
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .btn{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 370px;
      min-height: 78px;
      padding: 18px 40px;
      border-radius: 22px;
      background: linear-gradient(180deg, #3c80ff 0%, var(--accent) 100%);
      color: #fff;
      text-decoration: none;
      font-size: 30px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.01em;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow:
        0 12px 28px rgba(47,111,228,0.34),
        inset 0 1px 0 rgba(255,255,255,0.14);
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .btn:hover{
      transform: translateY(-2px);
      background: linear-gradient(180deg, #4a8cff 0%, var(--accent-dark) 100%);
      box-shadow:
        0 16px 32px rgba(47,111,228,0.38),
        inset 0 1px 0 rgba(255,255,255,0.16);
    }

    .subtext{
      max-width: 620px;
      font-size: 19px;
      line-height: 1.45;
      color: var(--muted);
    }

    .meta-row{
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
    }

    .meta-card{
      min-width: 290px;
      padding: 14px 18px;
      border-radius: 18px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      backdrop-filter: blur(5px);
    }

    .meta-title{
      margin: 0;
      font-size: 27px;
      font-weight: 700;
      line-height: 1.2;
    }

    .blue{
      color: var(--accent);
      font-weight: 800;
      margin-right: 6px;
    }

    .meta-sub{
      margin-top: 4px;
      font-size: 17px;
      line-height: 1.4;
      color: var(--muted);
    }

    @media (max-width: 900px){
      .hero{
        padding: 34px 18px 18px;
      }

      .socials{
        top: 10px;
        right: 12px;
        gap: 10px;
      }

      .social-btn{
        width: 44px;
        height: 44px;
      }

      .social-btn svg{
        width: 22px;
        height: 22px;
      }

      .content{
        max-width: 420px;
        margin-top: 52px;
      }

      h1{
        font-size: 58px;
      }

      .sub{
        font-size: 28px;
        letter-spacing: 0.16em;
      }

      .tagline{
        margin-top: 22px;
        font-size: 24px;
      }

      .cta-wrap{
        margin-top: 22px;
        gap: 12px;
      }

      .btn{
        min-width: 0;
        width: 100%;
        max-width: 320px;
        min-height: 64px;
        padding: 16px 24px;
        font-size: 22px;
        border-radius: 16px;
      }

      .subtext{
        max-width: 340px;
        font-size: 14px;
      }

      .meta-row{
        width: 100%;
        margin-top: 22px;
        gap: 12px;
      }

      .meta-card{
        width: 100%;
        max-width: 320px;
        min-width: 0;
        padding: 12px 16px;
      }

      .meta-title{
        font-size: 20px;
      }

      .meta-sub{
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="socials">
      <a class="social-btn" href="https://facebook.com" target="_blank" rel="noopener" aria-label="Facebook">
        <svg viewBox="0 0 24 24"><path d="M13.5 22v-8h2.7l.4-3.2h-3.1V8.8c0-.9.3-1.5 1.6-1.5h1.7V4.4c-.3 0-1.3-.1-2.5-.1-2.5 0-4.2 1.5-4.2 4.3v2.2H7.8V14h2.8v8h2.9z"/></svg>
      </a>
      <a class="social-btn" href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm0 2.2A2.8 2.8 0 0 0 4.2 7v10A2.8 2.8 0 0 0 7 19.8h10a2.8 2.8 0 0 0 2.8-2.8V7A2.8 2.8 0 0 0 17 4.2H7zm10.25 1.65a1.1 1.1 0 1 1 0 2.2 1.1 1.1 0 0 1 0-2.2zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2.2a2.8 2.8 0 1 0 0 5.6 2.8 2.8 0 0 0 0-5.6z"/></svg>
      </a>
      <a class="social-btn" href="https://tiktok.com" target="_blank" rel="noopener" aria-label="TikTok">
        <svg viewBox="0 0 24 24"><path d="M14.2 3c.3 2.1 1.5 3.7 3.5 4.6.8.4 1.7.6 2.3.6v3.1c-1.4 0-2.7-.3-4-.9v6.2c0 3.3-2.6 5.7-6 5.7-3.2 0-5.8-2.4-5.8-5.6 0-3.4 2.8-5.9 6.2-5.6v3.1a2.6 2.6 0 1 0 2.6 2.6V3h1.2z"/></svg>
      </a>
    </div>

    <div class="content">
      <div class="brand">
        <h1>PADEL CLUB</h1>
        <div class="sub">BOTOȘANI</div>
      </div>

      <div class="tagline">Descoperă fenomenul PADEL.</div>

      <div class="cta-wrap">
        <a href="https://playtomic.io/" target="_blank" rel="noopener" class="btn">REZERVĂ TEREN</a>
        <div class="subtext">
          Vei fi redirecționat către PlayTomic, cea mai mare aplicație de PADEL din lume, pentru a-ți face rezervarea.
        </div>
      </div>

      <div class="meta-row">
        <div class="meta-card">
          <p class="meta-title"><span class="blue">2</span>terenuri outdoor</p>
        </div>

        <div class="meta-card">
          <p class="meta-title">Program NON-STOP</p>
          <div class="meta-sub">Acces self-service, intri și joci oricând.</div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
