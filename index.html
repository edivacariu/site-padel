<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enjoy Padel Botoșani</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --accent: #22c55e;
      --accent-dark: #16a34a;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.88);
      --card-bg: rgba(7, 12, 20, 0.46);
      --card-border: rgba(255, 255, 255, 0.1);
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: #000;
    }

    body {
      background:
        linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.76)),
        url('./hero.png') center center / cover no-repeat;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 28px 20px 24px;
      text-align: center;
      position: relative;
    }

    .socials {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 10px;
    }

    .social-btn {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: rgba(26, 26, 26, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .social-btn svg {
      width: 22px;
      height: 22px;
      fill: #fff;
    }

    .content {
      width: 100%;
      max-width: 900px;
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    h1 {
      margin: 0;
      font-size: 84px;
      line-height: 0.95;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -1.8px;
      text-transform: uppercase;
    }

    .sub {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #ffffff;
      display: inline-block;
      position: relative;
      padding-bottom: 10px;
    }

    /* 🔥 linie mai lungă cât cuvântul */
    .sub::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 5px;
      border-radius: 999px;
      background: #ffffff;
    }

    .tagline {
      font-size: 32px;
      font-weight: 600;
      line-height: 1.3;
      color: #ffffff;
    }

    .btn {
      min-width: 340px;
      padding: 20px 38px;
      border-radius: 999px;
      background: linear-gradient(#34d399, var(--accent));
      color: #ffffff;
      font-size: 29px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 16px 34px rgba(34, 197, 94, 0.28);
    }

    .subtext {
      font-size: 18px;
      max-width: 680px;
      color: var(--muted);
    }

    .meta-row {
      margin-top: 16px;
      display: flex;
      justify-content: center;
    }

    .meta-card {
      padding: 18px 28px;
      border-radius: 20px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .big-number {
      font-size: 52px;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }

    .meta-title {
      font-size: 22px;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 46px;
      }

      .sub {
        font-size: 20px;
      }

      .tagline {
        font-size: 20px;
      }

      .btn {
        width: 100%;
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <div class="hero">

    <div class="socials">
      <a class="social-btn" href="https://facebook.com" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M13.5 22v-8h2.7l.4-3.2h-3.1V8.8c0-.9.3-1.5 1.6-1.5h1.7V4.4c-.3 0-1.3-.1-2.5-.1-2.5 0-4.2 1.5-4.2 4.3v2.2H7.8V14h2.8v8h2.9z"/></svg>
      </a>
      <a class="social-btn" href="https://instagram.com" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm0 2.2A2.8 2.8 0 0 0 4.2 7v10A2.8 2.8 0 0 0 7 19.8h10a2.8 2.8 0 0 0 2.8-2.8V7A2.8 2.8 0 0 0 17 4.2H7zm10.25 1.65a1.1 1.1 0 1 1 0 2.2 1.1 1.1 0 0 1 0-2.2zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2.2a2.8 2.8 0 1 0 0 5.6 2.8 2.8 0 0 0 0-5.6z"/></svg>
      </a>
      <a class="social-btn" href="https://tiktok.com" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M14.2 3c.3 2.1 1.5 3.7 3.5 4.6.8.4 1.7.6 2.3.6v3.1c-1.4 0-2.7-.3-4-.9v6.2c0 3.3-2.6 5.7-6 5.7-3.2 0-5.8-2.4-5.8-5.6 0-3.4 2.8-5.9 6.2-5.6v3.1a2.6 2.6 0 1 0 2.6 2.6V3h1.2z"/></svg>
      </a>
    </div>

    <div class="content">
      <h1>ENJOY PADEL</h1>
      <div class="sub">BOTOȘANI</div>

      <div class="tagline">Descoperă fenomenul PADEL.</div>

      <a href="https://playtomic.io/" target="_blank" class="btn">
        REZERVĂ TEREN!
      </a>

      <div class="subtext">
        Vei fi redirecționat către Playtomic pentru rezervare.
      </div>

      <div class="meta-row">
        <div class="meta-card">
          <div class="big-number">2</div>
          <div class="meta-title">terenuri outdoor</div>
        </div>
      </div>

    </div>

  </div>
</body>
</html>
