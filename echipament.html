<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Echipament — EnjoyPadel</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; }
  .container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .tabs { display: flex; margin-bottom: 1.5rem; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; }
  .tab-btn { flex: 1; padding: 13px 16px; background: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; font-weight: 500; color: #666; transition: background 0.15s; font-family: inherit; }
  .tab-btn.active { background: #0e1117; color: #fff; }
  .tab-btn:first-child { border-right: 1px solid #ddd; }
  .tab-btn i { font-size: 18px; }
  .view { display: none; }
  .view.active { display: flex; flex-direction: column; gap: 12px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: #999; text-transform: uppercase; padding: 4px 0 6px; }
  .item-card { display: flex; align-items: center; gap: 16px; padding: 16px; background: #fff; border: 1px solid #eee; border-radius: 12px; transition: border-color 0.15s; }
  .item-card:hover { border-color: #ccc; }
  .item-card.unavailable { opacity: 0.5; pointer-events: none; }
  .item-img { width: 68px; height: 68px; border-radius: 8px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
  .item-img img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }
  .item-img .emoji { font-size: 30px; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 3px; }
  .item-tag { font-size: 13px; color: #888; margin-bottom: 4px; }
  .item-free { font-size: 13px; font-weight: 500; color: #1a9e5c; }
  .item-price-label { font-size: 12px; color: #888; margin-bottom: 2px; }
  .item-price { font-size: 15px; font-weight: 600; color: #1a9e5c; }
  .avail-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #1a9e5c; margin-right: 5px; vertical-align: middle; }
  .avail-dot.low { background: #e67e22; }
  .avail-dot.none { background: #ccc; }
  .avail-text { font-size: 12px; color: #888; }
  .item-action { flex-shrink: 0; }
  .btn-outline { padding: 9px 16px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #111; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; font-family: inherit; white-space: nowrap; }
  .btn-outline:hover { background: #f5f5f5; }
  .btn-solid { padding: 9px 16px; border: none; border-radius: 8px; background: #0e1117; color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s; font-family: inherit; white-space: nowrap; }
  .btn-solid:hover { opacity: 0.85; }
  .btn-green { background: #1a9e5c; }
  .btn-red { background: #c0392b; }
  .btn-solid i, .btn-outline i { font-size: 16px; }
  .rented-card { display: flex; align-items: center; gap: 16px; padding: 16px; background: #fff; border: 1px solid #eee; border-radius: 12px; }
  .rented-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; background: #e1f5ee; color: #0f6e56; display: inline-block; margin-bottom: 4px; }
  .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; justify-content: center; }
  .drawer-overlay.open { display: flex; }
  .drawer { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 680px; padding: 20px; border-top: 1px solid #eee; max-height: 85vh; overflow-y: auto; }
  .drawer-handle { width: 36px; height: 4px; border-radius: 2px; background: #ddd; margin: 0 auto 20px; }
  .drawer-img-wrap { width: 100%; height: 150px; border-radius: 10px; background: #f5f5f5; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .drawer-img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; padding: 12px; }
  .drawer-img-wrap .emoji { font-size: 60px; }
  .drawer-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .drawer-sub { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.5; }
  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
  .detail-row:last-of-type { border-bottom: none; }
  .detail-label { color: #888; }
  .detail-value { font-weight: 500; }
  .drawer-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .drawer-actions button { flex: 1; min-width: 120px; padding: 13px; font-size: 15px; border-radius: 8px; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; border: none; font-weight: 500; }
  .da-cancel { background: #f5f5f5; border: 1px solid #ddd !important; color: #111; font-weight: 400 !important; }
  .da-confirm { background: #0e1117; color: #fff; }
  .da-pay { background: #1a9e5c; color: #fff; }
  .da-buy { background: #1a9e5c; color: #fff; }
  .balls-options { display: flex; gap: 10px; margin-top: 16px; }
  .balls-option { flex: 1; border: 2px solid #eee; border-radius: 10px; padding: 14px 10px; text-align: center; cursor: pointer; transition: border-color 0.15s; background: #fff; }
  .balls-option:hover { border-color: #1a9e5c; }
  .balls-option.selected { border-color: #1a9e5c; background: #f0faf5; }
  .balls-option.unavailable { opacity: 0.4; pointer-events: none; }
  .balls-option-qty { font-size: 22px; font-weight: 800; color: #0e1117; }
  .balls-option-label { font-size: 12px; color: #888; margin: 2px 0 6px; }
  .balls-option-price { font-size: 16px; font-weight: 700; color: #1a9e5c; }
  .empty-state { padding: 2.5rem 1rem; text-align: center; color: #888; font-size: 14px; border: 1px dashed #ddd; border-radius: 12px; line-height: 1.6; }
  .empty-state i { font-size: 36px; display: block; margin-bottom: 10px; color: #ccc; }
  .locker-open { text-align: center; padding: 10px 0 4px; }
  .locker-number { display: inline-block; font-size: 52px; font-weight: 800; background: #0e1117; color: #fff; border-radius: 12px; padding: 8px 28px; letter-spacing: 0.05em; margin-bottom: 12px; }
  .locker-hint { font-size: 13px; color: #888; line-height: 1.5; margin-top: 8px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0e1117; color: #fff; padding: 11px 22px; border-radius: 8px; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 300; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-placeholder { background: #eee; border-radius: 8px; height: 90px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body>
<div class="container">
  <div class="tabs">
    <button class="tab-btn active" id="tab-rent" onclick="switchTab('rent')">
      <i class="ti ti-search"></i> Închiriere echipament
    </button>
    <button class="tab-btn" id="tab-return" onclick="switchTab('return')">
      <i class="ti ti-refresh"></i> Returnează echipamentul
    </button>
  </div>

  <div class="view active" id="rent-view">
    <div id="rent-content">
      <div class="loading-placeholder"></div>
      <div class="loading-placeholder" style="margin-top:10px"></div>
    </div>
  </div>

  <div class="view" id="return-view">
    <div id="active-rentals-container">
      <div class="empty-state" id="no-rentals-msg">
        <i class="ti ti-mood-empty"></i>
        Nu ai niciun echipament activ.<br>Mergi la <b>Închiriere</b> pentru a lua o paletă.
      </div>
    </div>
  </div>
</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawerOutside(event)">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-img-wrap" id="drawer-img-wrap"></div>
    <div class="drawer-title" id="drawer-title"></div>
    <div class="drawer-sub" id="drawer-sub"></div>
    <div id="drawer-details"></div>
    <div class="drawer-actions" id="drawer-actions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL = 'https://netopia-pay.edivacariu.workers.dev';

// ---- DEVICE ID ----
function getCookie(name) {
  const m = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
  return m ? m.pop() : null;
}
function setCookie(name, value, days) {
  const d = new Date();
  d.setTime(d.getTime() + days * 86400000);
  document.cookie = name + '=' + value + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
}
function getDeviceId() {
  let id = getCookie('ep_device');
  if (!id) { try { id = localStorage.getItem('ep_device'); } catch(e) {} }
  if (!id) { id = 'dev-' + crypto.randomUUID(); }
  setCookie('ep_device', id, 365);
  try { localStorage.setItem('ep_device', id); } catch(e) {}
  return id;
}
const DEVICE_ID = getDeviceId();

// ---- POZE per nume ----
const ITEM_IMAGES = {
  'Black Crown VIVA adult barbati': { img: 'paleta-black-crown-viva.png', emoji: '🏓', tag: 'Adulți — nivel intermediar' },
  'Vibor-A Titan Junior copii femei': { img: 'paleta-vibor-a-titan-junior.png', emoji: '🏓', tag: 'Copii / femei' },
  'adidas MATCH BLACK premium': { img: 'paleta-adidas-match-black.png', emoji: '🎾', tag: 'Paletă premium — nivel avansat' },
};
const BALLS_IMAGE = { img: null, emoji: '🎱' };

function getItemMeta(content) {
  return ITEM_IMAGES[content] || { img: null, emoji: '🏓', tag: '' };
}

// ---- STATUS ----
let allLockers = [];

async function fetchStatus() {
  try {
    const res = await fetch(WORKER_URL + '/status');
    allLockers = await res.json();
    renderRentView();
  } catch(e) {}
}

function groupLockers(lockers) {
  const groups = {};
  lockers.forEach(l => {
    if (l.disabled) return;
    const key = l.content;
    if (!groups[key]) groups[key] = { content: key, lockers: [], totalStock: 0 };
    groups[key].lockers.push(l);
    if (l.stock) groups[key].totalStock += l.stock;
  });
  return Object.values(groups);
}

function renderRentView() {
  const groups = groupLockers(allLockers);
  const ballsGroup = groups.find(g => g.content.toLowerCase().includes('mingi'));
  const paletaGroups = groups.filter(g => !g.content.toLowerCase().includes('mingi'));

  let html = '';

  if (paletaGroups.length > 0) {
    paletaGroups.forEach(group => {
      const freeCount = group.lockers.filter(l => l.status === 'free').length;
      const isPremium = group.lockers.some(l => l.price > 0);
      const price = isPremium ? group.lockers.find(l => l.price > 0).price : 0;
      const meta = getItemMeta(group.content);

      const dotClass = freeCount === 0 ? 'none' : freeCount === 1 ? 'low' : '';
      const availText = freeCount === 0 ? 'Indisponibil momentan' : freeCount === 1 ? '1 dulap disponibil' : freeCount + ' dulapuri disponibile';
      const unavailClass = freeCount === 0 ? ' unavailable' : '';

      const imgHtml = meta.img
        ? `<img src="${meta.img}" alt="${group.content}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="emoji" style="display:none">${meta.emoji}</span>`
        : `<span class="emoji">${meta.emoji}</span>`;

      const actionBtn = isPremium
        ? `<button class="btn-solid" onclick="openDrawer('${encodeURIComponent(group.content)}')"><i class="ti ti-credit-card"></i> plătește</button>`
        : `<button class="btn-outline" onclick="openDrawer('${encodeURIComponent(group.content)}')"><i class="ti ti-lock-open"></i> deschide</button>`;

      html += `
        <div class="item-card${unavailClass}">
          <div class="item-img">${imgHtml}</div>
          <div class="item-info">
            <div class="item-name">${group.content}</div>
            ${meta.tag ? `<div class="item-tag">${meta.tag}</div>` : ''}
            ${isPremium ? `<div class="item-price-label">Preț închiriere:</div><div class="item-price">${price} lei / rezervare</div>` : `<div class="item-free">Paletă oferită gratuit</div>`}
            <div style="margin-top:5px"><span class="avail-dot ${dotClass}"></span><span class="avail-text">${availText}</span></div>
          </div>
          <div class="item-action">${actionBtn}</div>
        </div>
      `;
    });
  }

  if (ballsGroup) {
    const stock = ballsGroup.totalStock;
    const can1 = stock >= 1;
    const can2 = stock >= 2;
    const stockText = stock === 0 ? 'Stoc epuizat' : stock === 1 ? '1 set disponibil' : stock + ' seturi disponibile';
    const dotClass = stock === 0 ? 'none' : stock === 1 ? 'low' : '';

    html += `
      <div class="section-label" style="margin-top:8px">Mingi / accesorii</div>
      <div class="item-card${stock === 0 ? ' unavailable' : ''}">
        <div class="item-img"><span class="emoji">🎱</span></div>
        <div class="item-info">
          <div class="item-name">${ballsGroup.content}</div>
          <div style="margin-top:5px"><span class="avail-dot ${dotClass}"></span><span class="avail-text">${stockText}</span></div>
        </div>
        <div class="item-action">
          <button class="btn-solid btn-green" onclick="openBallsDrawer(${stock})"><i class="ti ti-shopping-cart"></i> cumpără</button>
        </div>
      </div>
    `;
  }

  document.getElementById('rent-content').innerHTML = html || '<div class="empty-state"><i class="ti ti-mood-empty"></i>Niciun echipament disponibil momentan.</div>';
}

// ---- DRAWER PALETE ----
let currentContent = null;

function openDrawer(encodedContent) {
  currentContent = decodeURIComponent(encodedContent);
  const group = groupLockers(allLockers).find(g => g.content === currentContent);
  if (!group) return;

  const meta = getItemMeta(currentContent);
  const isPremium = group.lockers.some(l => l.price > 0);
  const price = isPremium ? group.lockers.find(l => l.price > 0).price : 0;
  const freeCount = group.lockers.filter(l => l.status === 'free').length;

  const imgWrap = document.getElementById('drawer-img-wrap');
  imgWrap.innerHTML = meta.img
    ? `<img src="${meta.img}" alt="${currentContent}" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span class=\\'emoji\\'>${meta.emoji}</span>')">`
    : `<span class="emoji">${meta.emoji}</span>`;

  document.getElementById('drawer-title').textContent = currentContent;
  document.getElementById('drawer-sub').textContent = isPremium
    ? 'Paletă premium pentru jucători avansați. Preț fix pe rezervare, indiferent de durata jocului.'
    : 'Paletă standard — se împrumută gratuit și se returnează după joc.';

  document.getElementById('drawer-details').innerHTML = `
    <div class="detail-row"><span class="detail-label">Disponibile</span><span class="detail-value">${freeCount} dulap${freeCount !== 1 ? 'uri' : ''}</span></div>
    <div class="detail-row"><span class="detail-label">Cost</span><span class="detail-value">${isPremium ? price + ' lei / rezervare' : 'Gratuit'}</span></div>
  `;

  let actions = `<button class="da-cancel" onclick="closeDrawer()"><i class="ti ti-x"></i> Închide</button>`;
  if (isPremium) {
    actions += `<button class="da-pay" onclick="confirmRent()"><i class="ti ti-credit-card"></i> Plătește ${price} lei</button>`;
  } else {
    actions += `<button class="da-confirm" onclick="confirmRent()"><i class="ti ti-lock-open"></i> Împrumută gratuit</button>`;
  }
  document.getElementById('drawer-actions').innerHTML = actions;
  document.getElementById('drawer-overlay').classList.add('open');
}

async function confirmRent() {
  const group = groupLockers(allLockers).find(g => g.content === currentContent);
  if (!group) return;
  const isPremium = group.lockers.some(l => l.price > 0);

  const btn = document.querySelector('.da-confirm, .da-pay');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; }

  try {
    const res = await fetch(WORKER_URL + '/rent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: isPremium ? 'premium' : 'free', content: currentContent, device_id: DEVICE_ID })
    });
    const data = await res.json();

    if (data.error) { showToast('⚠️ ' + data.error); closeDrawer(); return; }

    if (data.requiresPayment && isPremium) {
      const res2 = await fetch(WORKER_URL + '/pay-and-rent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lockerId: data.lockerId, device_id: DEVICE_ID })
      });
      const pay = await res2.json();
      if (pay.payUrl) { window.location.href = pay.payUrl; }
      else { showToast('⚠️ Eroare la plată'); closeDrawer(); }
      return;
    }

    showLockerOpened(data.lockerId, data.sessionId, currentContent, getItemMeta(currentContent).emoji);
    fetchStatus();

  } catch(e) { showToast('⚠️ Eroare de conexiune'); closeDrawer(); }
}

// ---- DRAWER MINGI ----
let selectedBallsOption = null;

function openBallsDrawer(stock) {
  const can1 = stock >= 1;
  const can2 = stock >= 2;

  document.getElementById('drawer-img-wrap').innerHTML = '<span class="emoji">🎱</span>';
  document.getElementById('drawer-title').textContent = 'Set mingi Black Crown';
  document.getElementById('drawer-sub').textContent = 'Mingi Black Crown Pro pressurizate. Alege câte seturi dorești.';

  document.getElementById('drawer-details').innerHTML = `
    <div class="balls-options">
      <div class="balls-option${!can1 ? ' unavailable' : ''}" id="opt-1" onclick="selectBalls(1)">
        <div class="balls-option-qty">1</div>
        <div class="balls-option-label">set mingi</div>
        <div class="balls-option-price">30 lei</div>
      </div>
      <div class="balls-option${!can2 ? ' unavailable' : ''}" id="opt-2" onclick="selectBalls(2)">
        <div class="balls-option-qty">2</div>
        <div class="balls-option-label">seturi mingi</div>
        <div class="balls-option-price">50 lei</div>
      </div>
    </div>
    <div style="font-size:12px;color:#aaa;margin-top:10px;text-align:center">Stoc disponibil: ${stock} set${stock !== 1 ? 'uri' : ''}</div>
  `;

  selectedBallsOption = can1 ? 1 : null;
  if (can1) document.getElementById('opt-1') && document.getElementById('opt-1').classList.add('selected');

  document.getElementById('drawer-actions').innerHTML = `
    <button class="da-cancel" onclick="closeDrawer()"><i class="ti ti-x"></i> Închide</button>
    <button class="da-buy" id="btn-buy-balls" onclick="confirmBalls()"><i class="ti ti-shopping-cart"></i> Cumpără</button>
  `;
  document.getElementById('drawer-overlay').classList.add('open');
}

function selectBalls(qty) {
  selectedBallsOption = qty;
  document.querySelectorAll('.balls-option').forEach(el => el.classList.remove('selected'));
  document.getElementById('opt-' + qty) && document.getElementById('opt-' + qty).classList.add('selected');
  const btn = document.getElementById('btn-buy-balls');
  if (btn) btn.innerHTML = `<i class="ti ti-shopping-cart"></i> Cumpără — ${qty === 1 ? '30' : '50'} lei`;
}

async function confirmBalls() {
  if (!selectedBallsOption) { showToast('Alege câte seturi vrei'); return; }
  const btn = document.getElementById('btn-buy-balls');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; }

  try {
    const type = selectedBallsOption === 1 ? 'balls_1' : 'balls_2';
    const res = await fetch(WORKER_URL + '/rent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, device_id: DEVICE_ID })
    });
    const data = await res.json();

    if (data.error) { showToast('⚠️ ' + data.error); closeDrawer(); return; }

    // TODO: redirect Netopia pentru plată
    // Deocamdata simulam success (sandbox)
    showLockerOpened(data.lockerId, data.sessionId, 'Mingi Black Crown ×' + selectedBallsOption, '🎱');
    fetchStatus();

  } catch(e) { showToast('⚠️ Eroare de conexiune'); closeDrawer(); }
}

function showLockerOpened(lockerId, sessionId, content, emoji) {
  document.getElementById('drawer-details').innerHTML = `
    <div class="locker-open">
      <div style="font-size:13px;color:#888;margin-bottom:8px">✅ Dulapul s-a deschis!</div>
      <div class="locker-number">#${lockerId}</div>
      <div class="locker-hint">Ridică echipamentul și închide ușa.<br>La tab-ul <b>Returnare</b> vei găsi articolul tău automat.</div>
    </div>
  `;
  document.getElementById('drawer-actions').innerHTML = `
    <button class="da-confirm" style="background:#1a9e5c" onclick="finishPickup('${sessionId}','${content}','${emoji}',${lockerId})">
      <i class="ti ti-check"></i> Am ridicat echipamentul
    </button>
  `;
}

function finishPickup(sessionId, content, emoji, lockerId) {
  closeDrawer();
  showToast('✓ Dulap #' + lockerId + ' deschis!');
  addRentalCard(sessionId, lockerId, content, emoji);
}

// ---- RETURN ----
async function loadMySessions() {
  try {
    const res = await fetch(WORKER_URL + '/my-sessions?device_id=' + encodeURIComponent(DEVICE_ID));
    const sessions = await res.json();
    const container = document.getElementById('active-rentals-container');
    container.querySelectorAll('.rented-card').forEach(c => c.remove());

    if (sessions.length === 0) {
      document.getElementById('no-rentals-msg').style.display = '';
    } else {
      document.getElementById('no-rentals-msg').style.display = 'none';
      sessions.forEach(s => {
        const meta = getItemMeta(s.content);
        addRentalCard(s.session_id, s.locker_id, s.content, meta.emoji, meta.img);
      });
    }
  } catch(e) {}
}

function addRentalCard(sessionId, lockerId, content, emoji, img) {
  const container = document.getElementById('active-rentals-container');
  if (container.querySelector('[data-session="' + sessionId + '"]')) return;
  document.getElementById('no-rentals-msg').style.display = 'none';

  const imgHtml = img
    ? `<img src="${img}" alt="${content}" style="width:100%;height:100%;object-fit:contain;padding:6px" onerror="this.style.display='none'">`
    : `<span style="font-size:26px">${emoji}</span>`;

  const card = document.createElement('div');
  card.className = 'rented-card';
  card.setAttribute('data-session', sessionId);
  card.innerHTML = `
    <div class="item-img">${imgHtml}</div>
    <div style="flex:1;min-width:0">
      <span class="rented-badge">Activ — Dulap #${lockerId}</span>
      <div class="item-name" style="margin-top:2px">${content}</div>
    </div>
    <button class="btn-solid btn-red" onclick="returnItem('${sessionId}', this)">
      <i class="ti ti-arrow-back-up"></i> Returnează
    </button>
  `;
  container.appendChild(card);
}

async function returnItem(sessionId, btn) {
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  try {
    const res = await fetch(WORKER_URL + '/return', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId })
    });
    const data = await res.json();
    if (data.success) {
      showToast('✓ Dulap #' + data.lockerId + ' deschis — mulțumim!');
      setTimeout(() => {
        document.querySelector('[data-session="' + sessionId + '"]')?.remove();
        if (!document.querySelector('.rented-card')) {
          document.getElementById('no-rentals-msg').style.display = '';
        }
      }, 1500);
      fetchStatus();
    } else {
      showToast('⚠️ ' + (data.error || 'Eroare'));
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-arrow-back-up"></i> Returnează';
    }
  } catch(e) {
    showToast('⚠️ Eroare de conexiune');
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-arrow-back-up"></i> Returnează';
  }
}

function switchTab(tab) {
  document.getElementById('tab-rent').classList.toggle('active', tab === 'rent');
  document.getElementById('tab-return').classList.toggle('active', tab === 'return');
  document.getElementById('rent-view').classList.toggle('active', tab === 'rent');
  document.getElementById('return-view').classList.toggle('active', tab === 'return');
  if (tab === 'return') loadMySessions();
}

function closeDrawer() { document.getElementById('drawer-overlay').classList.remove('open'); }
function closeDrawerOutside(e) { if (e.target === document.getElementById('drawer-overlay')) closeDrawer(); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

fetchStatus();
setInterval(fetchStatus, 10000);
loadMySessions();
</script>
</body>
</html>
