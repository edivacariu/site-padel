<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echipament — EnjoyPadel</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; }
  .container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }
  .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; }
  .tab-btn { flex: 1; padding: 13px 16px; background: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; font-weight: 500; color: #666; transition: background 0.15s; }
  .tab-btn.active { background: #0e1117; color: #fff; }
  .tab-btn:first-child { border-right: 1px solid #ddd; }
  .tab-btn i { font-size: 18px; }
  .equipment-list { display: flex; flex-direction: column; gap: 12px; }
  .item-card { display: flex; align-items: center; gap: 16px; padding: 16px; background: #fff; border: 1px solid #eee; border-radius: 12px; transition: border-color 0.15s; }
  .item-card:hover { border-color: #ccc; }
  .item-img { width: 64px; height: 64px; border-radius: 8px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 28px; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 3px; }
  .item-tag { font-size: 13px; color: #888; margin-bottom: 4px; }
  .item-free { font-size: 13px; font-weight: 500; color: #1a9e5c; }
  .item-price-label { font-size: 12px; color: #888; margin-bottom: 2px; }
  .item-price { font-size: 15px; font-weight: 600; color: #1a9e5c; }
  .item-action { flex-shrink: 0; }
  .btn-outline { padding: 9px 16px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #111; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .btn-outline:hover { background: #f5f5f5; }
  .btn-solid { padding: 9px 16px; border: none; border-radius: 8px; background: #0e1117; color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s; }
  .btn-solid:hover { opacity: 0.85; }
  .btn-solid i, .btn-outline i { font-size: 16px; }
  .return-view { display: none; flex-direction: column; gap: 12px; }
  .return-view.active { display: flex; }
  .rent-view.hidden { display: none; }
  .empty-return { padding: 2.5rem 1rem; text-align: center; color: #888; font-size: 14px; border: 1px dashed #ddd; border-radius: 12px; }
  .empty-return i { font-size: 32px; display: block; margin-bottom: 8px; }
  .rented-card { display: flex; align-items: center; gap: 16px; padding: 16px; background: #fff; border: 1px solid #eee; border-radius: 12px; }
  .rented-badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 999px; background: #e1f5ee; color: #0f6e56; margin-bottom: 4px; display: inline-block; }
  .rented-since { font-size: 12px; color: #888; }
  .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; justify-content: center; }
  .drawer-overlay.open { display: flex; }
  .drawer { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 680px; padding: 20px; border-top: 1px solid #eee; max-height: 80vh; overflow-y: auto; }
  .drawer-handle { width: 36px; height: 4px; border-radius: 2px; background: #ddd; margin: 0 auto 16px; }
  .drawer-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .drawer-sub { font-size: 13px; color: #888; margin-bottom: 20px; }
  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
  .detail-row:last-of-type { border-bottom: none; }
  .detail-label { color: #888; }
  .detail-value { font-weight: 500; }
  .drawer-img { width: 100%; height: 140px; border-radius: 8px; background: #f5f5f5; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; font-size: 56px; }
  .drawer-actions { display: flex; gap: 10px; margin-top: 20px; }
  .drawer-actions button { flex: 1; padding: 12px; font-size: 15px; border-radius: 8px; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-cancel { background: #f5f5f5; border: 1px solid #ddd; color: #111; }
  .btn-cancel:hover { background: #eee; }
  .btn-confirm { background: #0e1117; border: none; color: #fff; font-weight: 500; }
  .btn-pay { background: #1a9e5c; border: none; color: #fff; font-weight: 500; }
  .btn-pay:hover { background: #158a4f; }
  .btn-confirm:hover { opacity: 0.85; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0e1117; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 200; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="container">

  <div class="tabs">
    <button class="tab-btn active" id="tab-rent" onclick="switchTab('rent')">
      <i class="ti ti-search"></i> Închiriere echipament
    </button>
    <button class="tab-btn" id="tab-return" onclick="switchTab('return')">
      <i class="ti ti-refresh"></i> Returnează echipamentul
    </button>
  </div>

  <div class="rent-view equipment-list" id="rent-view">

    <div class="item-card">
      <div class="item-img">🏓</div>
      <div class="item-info">
        <div class="item-name">Black Crown VIVA</div>
        <div class="item-free">Paletă oferită gratuit</div>
      </div>
      <div class="item-action">
        <button class="btn-outline" onclick="openDrawer('bc-viva')">
          <i class="ti ti-plus"></i> deschide
        </button>
      </div>
    </div>

    <div class="item-card">
      <div class="item-img">🎾</div>
      <div class="item-info">
        <div class="item-name">adidas MATCH BLACK</div>
        <div class="item-price-label">Preț închiriere:</div>
        <div class="item-price">15 lei / rezervare</div>
      </div>
      <div class="item-action">
        <button class="btn-solid" onclick="openDrawer('adidas-match')">
          <i class="ti ti-credit-card"></i> plătește
        </button>
      </div>
    </div>

    <div class="item-card">
      <div class="item-img">🏓</div>
      <div class="item-info">
        <div class="item-name">Vibor-A Titan Junior</div>
        <div class="item-tag">Pentru copii / femei</div>
        <div class="item-free">Paletă oferită gratuit</div>
      </div>
      <div class="item-action">
        <button class="btn-outline" onclick="openDrawer('vibora-titan')">
          <i class="ti ti-plus"></i> deschide
        </button>
      </div>
    </div>

    <div class="item-card">
      <div class="item-img">🎱</div>
      <div class="item-info">
        <div class="item-name">Set mingi black brown 1+1</div>
        <div class="item-price-label">Preț achiziție:</div>
        <div class="item-price">50 lei</div>
      </div>
      <div class="item-action">
        <button class="btn-solid" onclick="openDrawer('mingi-set')">
          <i class="ti ti-shopping-cart"></i> cumpără
        </button>
      </div>
    </div>

  </div>

  <div class="return-view" id="return-view">
    <div class="empty-return">
      <i class="ti ti-package-off"></i>
      Nicio paletă activă de returnat.<br>Închiriați echipament din tab-ul de închiriere.
    </div>
  </div>

</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer(event)">
  <div class="drawer" id="drawer-panel">
    <div class="drawer-handle"></div>
    <div class="drawer-img" id="drawer-img">🏓</div>
    <div class="drawer-title" id="drawer-title"></div>
    <div class="drawer-sub" id="drawer-sub"></div>
    <div id="drawer-details"></div>
    <div class="drawer-actions" id="drawer-actions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const items = {
  'bc-viva': {
    emoji: '🏓',
    name: 'Black Crown VIVA',
    sub: 'Paletă pentru adulți — nivel intermediar',
    details: [
      ['Tip', 'Paletă padel'],
      ['Nivel', 'Intermediar'],
      ['Greutate', '~360g'],
      ['Disponibil', '3 buc.'],
      ['Cost', 'Gratuit cu rezervarea'],
    ],
    actionType: 'rent-free'
  },
  'adidas-match': {
    emoji: '🎾',
    name: 'adidas MATCH BLACK',
    sub: 'Paletă profesională — performanță înaltă',
    price: '15 lei / rezervare',
    details: [
      ['Tip', 'Paletă padel'],
      ['Nivel', 'Avansat'],
      ['Greutate', '~370g'],
      ['Disponibil', '2 buc.'],
      ['Cost închiriere', '15 lei'],
    ],
    actionType: 'pay'
  },
  'vibora-titan': {
    emoji: '🏓',
    name: 'Vibor-A Titan Junior',
    sub: 'Pentru copii și femei — mâner compact',
    details: [
      ['Tip', 'Paletă padel junior'],
      ['Nivel', 'Începător / Intermediar'],
      ['Greutate', '~310g'],
      ['Disponibil', '4 buc.'],
      ['Cost', 'Gratuit cu rezervarea'],
    ],
    actionType: 'rent-free'
  },
  'mingi-set': {
    emoji: '🎱',
    name: 'Set mingi black brown 1+1',
    sub: 'Set 2 tuburi × 3 mingi — Black Crown Pro',
    price: '50 lei',
    details: [
      ['Conținut', '2 tuburi × 3 mingi'],
      ['Brand', 'Black Crown Pro'],
      ['Tip', 'Mingi pressurizate'],
      ['Cost achiziție', '50 lei'],
    ],
    actionType: 'buy'
  }
};

let currentItem = null;

function switchTab(tab) {
  document.getElementById('tab-rent').classList.toggle('active', tab === 'rent');
  document.getElementById('tab-return').classList.toggle('active', tab === 'return');
  document.getElementById('rent-view').classList.toggle('hidden', tab !== 'rent');
  document.getElementById('return-view').classList.toggle('active', tab === 'return');
}

function openDrawer(id) {
  currentItem = id;
  const item = items[id];
  document.getElementById('drawer-img').textContent = item.emoji;
  document.getElementById('drawer-title').textContent = item.name;
  document.getElementById('drawer-sub').textContent = item.sub;
  const details = item.details.map(([label, val]) =>
    `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${val}</span></div>`
  ).join('');
  document.getElementById('drawer-details').innerHTML = details;

  let actions = `<button class="btn-cancel" onclick="closeDrawer()"><i class="ti ti-x"></i> Închide</button>`;
  if (item.actionType === 'rent-free') {
    actions += `<button class="btn-confirm" onclick="confirmRent()"><i class="ti ti-check"></i> Confirmă rezervarea</button>`;
  } else if (item.actionType === 'pay') {
    actions += `<button class="btn-pay" onclick="confirmRent()"><i class="ti ti-credit-card"></i> Plătește ${item.price}</button>`;
  } else if (item.actionType === 'buy') {
    actions += `<button class="btn-pay" onclick="confirmRent()"><i class="ti ti-shopping-cart"></i> Cumpără — ${item.price}</button>`;
  }
  document.getElementById('drawer-actions').innerHTML = actions;
  document.getElementById('drawer-overlay').classList.add('open');
}

function closeDrawer(e) {
  if (!e || e.target === document.getElementById('drawer-overlay')) {
    document.getElementById('drawer-overlay').classList.remove('open');
  }
}

function confirmRent() {
  const item = items[currentItem];
  document.getElementById('drawer-overlay').classList.remove('open');
  showToast('✓ ' + item.name + ' — rezervat cu succes!');

  if (item.actionType === 'rent-free' || item.actionType === 'pay') {
    const returnView = document.getElementById('return-view');
    const emptyMsg = returnView.querySelector('.empty-return');
    if (emptyMsg) emptyMsg.remove();

    const card = document.createElement('div');
    card.className = 'rented-card';
    card.innerHTML = `
      <div class="item-img">${item.emoji}</div>
      <div style="flex:1;">
        <div><span class="rented-badge">Activ</span></div>
        <div class="item-name">${item.name}</div>
        <div class="rented-since">Închiriat acum</div>
      </div>
      <button class="btn-solid" style="background:#c0392b;" onclick="this.closest('.rented-card').remove(); checkEmpty();">
        <i class="ti ti-arrow-back-up"></i> Returnează
      </button>
    `;
    returnView.appendChild(card);
  }
}

function checkEmpty() {
  const returnView = document.getElementById('return-view');
  if (returnView.querySelectorAll('.rented-card').length === 0) {
    returnView.innerHTML = `<div class="empty-return"><i class="ti ti-package-off"></i>Nicio paletă activă de returnat.<br>Închiriați echipament din tab-ul de închiriere.</div>`;
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>

</body>
</html>
