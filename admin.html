<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Admin — EnjoyPadel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; }

  /* LOGIN */
  .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #fff; border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 360px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
  .login-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .login-box p { font-size: 13px; color: #888; margin-bottom: 24px; }
  .login-box input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; font-family: inherit; }
  .login-box input:focus { border-color: #0e1117; }
  .login-box input.error { border-color: #e74c3c; }
  .login-box button { width: 100%; margin-top: 12px; padding: 13px; background: #0e1117; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .login-box button:hover { opacity: 0.85; }

  /* ADMIN */
  .admin-screen { display: none; }
  .header { background: #0e1117; color: #fff; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: #aaa; }
  .btn-logout { padding: 7px 14px; background: #fff2; border: none; border-radius: 6px; color: #fff; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-logout:hover { background: #fff3; }

  .stats-bar { display: flex; gap: 12px; padding: 16px 20px; background: #fff; border-bottom: 1px solid #eee; flex-wrap: wrap; }
  .stat { text-align: center; padding: 8px 20px; border-radius: 8px; }
  .stat-num { font-size: 24px; font-weight: 700; }
  .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
  .stat.free { background: #e8f8f0; }
  .stat.free .stat-num { color: #1a9e5c; }
  .stat.occupied { background: #fff3e0; }
  .stat.occupied .stat-num { color: #e67e22; }
  .stat.total { background: #f0f0f0; }

  .content { padding: 20px; }
  .section-title { font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; margin-top: 20px; }
  .section-title:first-child { margin-top: 0; }

  .lockers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }

  .locker-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .locker-card.occupied { border-color: #f5c97a; background: #fffbf0; }
  .locker-card.reserved { border-color: #a8d8f0; background: #f0f8ff; }

  .locker-num { width: 44px; height: 44px; border-radius: 8px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #555; flex-shrink: 0; }
  .locker-card.occupied .locker-num { background: #ffeaa7; color: #c0392b; }
  .locker-card.reserved .locker-num { background: #d0eaf8; color: #2980b9; }

  .locker-info { flex: 1; min-width: 0; }
  .locker-content { font-size: 14px; font-weight: 600; color: #111; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .locker-status { font-size: 12px; }
  .locker-status.free { color: #1a9e5c; }
  .locker-status.occupied { color: #e67e22; }
  .locker-status.reserved { color: #2980b9; }
  .locker-time { font-size: 11px; color: #aaa; margin-top: 2px; }

  .btn-free { padding: 6px 12px; background: #c0392b; color: #fff; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; }
  .btn-free:hover { background: #a93226; }
  .btn-free:disabled { background: #ccc; cursor: not-allowed; }

  .refresh-info { font-size: 12px; color: #aaa; text-align: right; padding: 8px 20px 0; }

  .spinner-inline { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.1); border-top-color: #555; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px; margin-left: 4px; vertical-align: middle; }
  .badge.price { background: #e8f8f0; color: #0f6e56; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <h2>🏓 EnjoyPadel Admin</h2>
    <p>Introdu parola pentru a accesa panoul de administrare.</p>
    <input type="password" id="pass-input" placeholder="Parolă" onkeydown="if(event.key==='Enter')checkPass()">
    <button onclick="checkPass()">Intră</button>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="admin-screen">
  <div class="header">
    <h1>🏓 EnjoyPadel — Admin</h1>
    <div class="header-right">
      <span id="last-update">Se încarcă...</span>
      <button class="btn-logout" onclick="logout()">Ieșire</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat free">
      <div class="stat-num" id="stat-free">—</div>
      <div class="stat-label">Libere</div>
    </div>
    <div class="stat occupied">
      <div class="stat-num" id="stat-occupied">—</div>
      <div class="stat-label">Ocupate</div>
    </div>
    <div class="stat total">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Total</div>
    </div>
  </div>

  <div class="content">
    <div class="section-title">Palete standard (1–4)</div>
    <div class="lockers-grid" id="grid-1-4"></div>

    <div class="section-title">Palete premium (5–6)</div>
    <div class="lockers-grid" id="grid-5-6"></div>

    <div class="section-title">Palete standard (7–20)</div>
    <div class="lockers-grid" id="grid-7-20"></div>

    <div class="section-title">Mingi & rezerve (21–24)</div>
    <div class="lockers-grid" id="grid-21-24"></div>
  </div>

  <div class="refresh-info">Auto-refresh la 10s · <span id="next-refresh">10</span>s</div>
</div>

<script>
const WORKER_URL = 'https://netopia-pay.edivacariu.workers.dev';
const PASS = 'enjoy';

// LOGIN
function checkPass() {
  const val = document.getElementById('pass-input').value;
  if (val === PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadData();
    startRefresh();
  } else {
    const input = document.getElementById('pass-input');
    input.classList.add('error');
    input.value = '';
    input.placeholder = 'Parolă greșită!';
    setTimeout(() => { input.classList.remove('error'); input.placeholder = 'Parolă'; }, 2000);
  }
}

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  clearInterval(refreshInterval);
}

// DATA
async function loadData() {
  try {
    const [statusRes, sessionsRes] = await Promise.all([
      fetch(WORKER_URL + '/status'),
      fetch(WORKER_URL + '/admin-sessions')
    ]);
    const lockers = await statusRes.json();
    const sessions = sessionsRes.ok ? await sessionsRes.json() : [];

    // Map sessions by locker_id
    const sessionMap = {};
    sessions.forEach(s => { sessionMap[s.locker_id] = s; });

    renderLockers(lockers, sessionMap);

    const free = lockers.filter(l => l.status === 'free').length;
    const occupied = lockers.filter(l => l.status !== 'free').length;
    document.getElementById('stat-free').textContent = free;
    document.getElementById('stat-occupied').textContent = occupied;
    document.getElementById('stat-total').textContent = lockers.length;

    const now = new Date();
    document.getElementById('last-update').textContent = 'Actualizat: ' + now.toLocaleTimeString('ro-RO');
  } catch(e) {
    console.error(e);
  }
}

function timeSince(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const diff = Math.floor((Date.now() - d.getTime()) / 1000);
  if (diff < 60) return diff + 's';
  if (diff < 3600) return Math.floor(diff/60) + 'min';
  return Math.floor(diff/3600) + 'h ' + Math.floor((diff%3600)/60) + 'min';
}

function renderLockers(lockers, sessionMap) {
  const grids = {
    '1-4': [],
    '5-6': [],
    '7-20': [],
    '21-24': []
  };

  lockers.forEach(l => {
    if (l.id <= 4) grids['1-4'].push(l);
    else if (l.id <= 6) grids['5-6'].push(l);
    else if (l.id <= 20) grids['7-20'].push(l);
    else grids['21-24'].push(l);
  });

  Object.entries(grids).forEach(([key, list]) => {
    const grid = document.getElementById('grid-' + key);
    if (!grid) return;
    grid.innerHTML = list.map(l => {
      const session = sessionMap[l.id];
      const isOccupied = l.status === 'occupied';
      const isReserved = l.status === 'reserved';
      const isFree = l.status === 'free';

      let statusText = 'Liber';
      let statusClass = 'free';
      if (isOccupied) { statusText = 'Ocupat'; statusClass = 'occupied'; }
      if (isReserved) { statusText = 'Rezervat (plată)'; statusClass = 'reserved'; }

      const timeText = session ? 'de ' + timeSince(session.created_at) : '';
      const priceTag = l.price > 0 ? `<span class="badge price">${l.price} lei</span>` : '';

      const freeBtn = !isFree ? `<button class="btn-free" onclick="forceRelease(${l.id}, this)">Eliberează</button>` : '';

      return `
        <div class="locker-card ${l.status}" id="locker-${l.id}">
          <div class="locker-num">${l.id}</div>
          <div class="locker-info">
            <div class="locker-content">${l.content}${priceTag}</div>
            <div class="locker-status ${statusClass}">${statusText}</div>
            ${timeText ? `<div class="locker-time">${timeText}</div>` : ''}
          </div>
          ${freeBtn}
        </div>
      `;
    }).join('');
  });
}

async function forceRelease(lockerId, btn) {
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-inline"></span>';

  try {
    const res = await fetch(WORKER_URL + '/admin-release', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lockerId, adminPass: PASS })
    });
    const data = await res.json();
    if (data.success) {
      loadData();
    } else {
      btn.disabled = false;
      btn.textContent = 'Eliberează';
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Eliberează';
  }
}

// REFRESH
let refreshInterval;
let countdown = 10;

function startRefresh() {
  refreshInterval = setInterval(() => {
    countdown--;
    document.getElementById('next-refresh').textContent = countdown;
    if (countdown <= 0) {
      countdown = 10;
      loadData();
    }
  }, 1000);
}
</script>
</body>
</html>
