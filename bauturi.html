<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Băuturi — EnjoyPadel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2f2ef; --card: #fff; --border: #e8e8e4;
    --text: #111110; --text-muted: #999990;
    --green: #1a9e5c; --green-dark: #157a47;
    --accent: #0e1117; --red: #e53935;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  .top-bar { background: var(--accent); color: #fff; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .top-bar-title { font-size: 16px; font-weight: 700; }
  .top-bar-sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }
  .cart-btn { background: var(--green); border: none; border-radius: 10px; color: #fff; padding: 8px 14px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 7px; }
  .cart-btn:hover { background: var(--green-dark); }
  .cart-btn.hidden { opacity: 0; pointer-events: none; }
  .cart-count { background: #fff; color: var(--green-dark); border-radius: 50%; width: 20px; height: 20px; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; }

  .container { max-width: 640px; margin: 0 auto; padding: 16px 14px 120px; }
  .cat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; padding: 22px 2px 9px; }
  .cat-label:first-child { padding-top: 4px; }

  /* ── CARD SIMPLU ── */
  .item-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px 14px; display: flex; align-items: center; gap: 14px; margin-bottom: 9px; box-shadow: var(--shadow); }
  .item-img { width: 90px; height: 90px; border-radius: 12px; background: #f5f5f2; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
  .item-img img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
  .item-img .emoji-fb { font-size: 40px; }
  .item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .item-name { font-size: 15px; font-weight: 700; }
  .item-size { font-size: 12px; color: var(--text-muted); }
  .item-price { font-size: 16px; font-weight: 700; color: var(--green); margin-top: 2px; }
  .item-oos { font-size: 12px; color: var(--red); font-weight: 600; }
  .item-action { flex-shrink: 0; }

  /* ── CARD GRUP ── */
  .group-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 9px; box-shadow: var(--shadow); overflow: hidden; }
  .group-header { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }

  /* Poze suprapuse */
  .group-imgs { position: relative; flex-shrink: 0; width: 90px; height: 90px; }
  .group-img { position: absolute; width: 65px; height: 65px; border-radius: 10px; background: #f5f5f2; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
  .group-img:first-child { top: 0; left: 0; z-index: 2; }
  .group-img:nth-child(2) { bottom: 0; right: 0; z-index: 1; width: 58px; height: 58px; }
  .group-img:nth-child(3) { bottom: 0; left: 18px; z-index: 0; width: 52px; height: 52px; }
  .group-img:only-child { top: 50%; left: 50%; transform: translate(-50%,-50%); width: 80px; height: 80px; }
  .group-img img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }
  .group-img .emoji-fb { font-size: 28px; }

  .group-header-info { flex: 1; min-width: 0; }
  .group-title { font-size: 15px; font-weight: 700; }
  .group-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .group-price-range { font-size: 20px; font-weight: 800; color: var(--green); margin-top: 4px; }

  .group-toggle { background: none; border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; white-space: nowrap; flex-shrink: 0; }
  .group-toggle:hover { background: #f5f5f2; }
  .group-toggle.has-items { background: var(--accent); color: #fff; border-color: var(--accent); }

  .group-variants { display: none; border-top: 1px solid var(--border); }
  .group-card.open .group-variants { display: block; }

  .variant-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid #f5f5f2; }
  .variant-row:last-child { border-bottom: none; }
  .variant-row.oos { opacity: 0.45; }
  .variant-img { width: 52px; height: 52px; border-radius: 8px; background: #f5f5f2; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .variant-img img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
  .variant-img .emoji-fb { font-size: 24px; }
  .variant-name { flex: 1; font-size: 13px; font-weight: 600; line-height: 1.3; }
  .variant-price { font-size: 13px; font-weight: 700; color: var(--green); margin-right: 6px; white-space: nowrap; }
  .variant-qty { display: flex; align-items: center; background: #f0f0ec; border-radius: 8px; padding: 2px; flex-shrink: 0; }
  .vqty-btn { width: 30px; height: 30px; border: none; background: transparent; border-radius: 6px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); transition: background 0.12s; }
  .vqty-btn:hover { background: #e4e4e0; }
  .vqty-btn.plus { background: var(--accent); color: #fff; }
  .vqty-btn.plus:hover { background: #2a2f3a; }
  .vqty-num { width: 26px; text-align: center; font-size: 14px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .vadd-btn { width: 30px; height: 30px; border: none; background: var(--accent); color: #fff; border-radius: 8px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .vadd-btn:hover { background: #2a2f3a; }

  /* QTY simple */
  .qty-controls { display: flex; align-items: center; background: #f0f0ec; border-radius: 10px; padding: 3px; }
  .qty-btn { width: 36px; height: 36px; border: none; background: transparent; border-radius: 8px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); transition: background 0.12s; }
  .qty-btn:hover { background: #e4e4e0; }
  .qty-btn.plus { background: var(--accent); color: #fff; }
  .qty-btn.plus:hover { background: #2a2f3a; }
  .qty-num { width: 30px; text-align: center; font-size: 16px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .add-btn { padding: 10px 16px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
  .add-btn:hover { background: #2a2f3a; }

  .sticky-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; padding: 12px 16px 22px; background: linear-gradient(to top, var(--bg) 65%, transparent); display: flex; justify-content: center; pointer-events: none; }
  .sticky-bar.visible { pointer-events: all; }
  .pay-btn { background: var(--green); color: #fff; border: none; border-radius: 14px; padding: 16px 28px; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 20px rgba(26,158,92,0.35); max-width: 480px; width: 100%; justify-content: center; opacity: 0; transform: translateY(20px); transition: opacity 0.25s, transform 0.25s; }
  .sticky-bar.visible .pay-btn { opacity: 1; transform: translateY(0); }
  .pay-btn:hover { background: var(--green-dark); }

  .loading-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; backdrop-filter: blur(2px); }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 640px; padding: 0 0 32px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.22s ease; }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 14px auto 20px; }
  .modal-inner { padding: 0 20px; }
  .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .order-line { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .order-line:last-of-type { border-bottom: none; }
  .order-qty { color: var(--text-muted); margin: 0 12px; font-family: 'DM Mono', monospace; font-size: 13px; }
  .order-price { font-weight: 700; }
  .total-line { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 0; font-size: 17px; font-weight: 700; border-top: 2px solid var(--text); margin-top: 4px; }
  .total-amount { color: var(--green); font-size: 22px; }
  .modal-pay-btn { width: 100%; margin-top: 20px; padding: 16px; background: var(--green); color: #fff; border: none; border-radius: 12px; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; }
  .modal-pay-btn:hover { background: var(--green-dark); }
  .modal-cancel-btn { width: 100%; margin-top: 10px; padding: 14px; background: #f3f3f0; color: var(--text); border: none; border-radius: 12px; font-family: inherit; font-size: 15px; font-weight: 500; cursor: pointer; }
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--accent); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 300; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 15px; }

  /* ── MODAL DATE CLIENT ── */
  .customer-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 300; align-items: flex-end; justify-content: center; backdrop-filter: blur(3px); }
  .customer-modal-overlay.open { display: flex; }
  .customer-modal { background: #fff; border-radius: 24px 24px 0 0; width: 100%; max-width: 640px; padding: 0 0 36px; animation: slideUp 0.22s ease; }
  .customer-modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 14px auto 0; }
  .customer-modal-inner { padding: 20px 22px 0; }
  .customer-modal-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .customer-modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 22px; line-height: 1.5; }
  .customer-field { margin-bottom: 14px; }
  .customer-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .customer-field input { width: 100%; padding: 13px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 15px; color: var(--text); background: #fafaf8; outline: none; transition: border-color 0.15s; }
  .customer-field input:focus { border-color: var(--green); background: #fff; }
  .customer-field input.error { border-color: var(--red); }
  .customer-field-row { display: flex; gap: 10px; }
  .customer-field-row .customer-field { flex: 1; }
  .customer-save-note { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; display: flex; align-items: flex-start; gap: 6px; line-height: 1.4; }
  .customer-save-note svg { flex-shrink: 0; margin-top: 1px; }
  .customer-pay-btn { width: 100%; padding: 16px; background: var(--green); color: #fff; border: none; border-radius: 12px; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; }
  .customer-pay-btn:hover { background: var(--green-dark); }
  .customer-back-btn { width: 100%; margin-top: 10px; padding: 14px; background: #f3f3f0; color: var(--text); border: none; border-radius: 12px; font-family: inherit; font-size: 15px; font-weight: 500; cursor: pointer; }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <div class="top-bar-title">🥤 Băuturi & Răcoritoare</div>
    <div class="top-bar-sub">Alege, plătești, iei din frigider</div>
  </div>
  <button class="cart-btn hidden" id="cartBtn" onclick="openCartModal()">
    Coș <span class="cart-count" id="cartCount">0</span>
  </button>
</div>

<div class="container" id="mainContainer">
  <div class="loading-state"><div class="spinner"></div><div>Se încarcă băuturile...</div></div>
</div>

<div class="sticky-bar" id="stickyBar">
  <button class="pay-btn" onclick="openCartModal()">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
    <span id="payBtnText">Plătește 0 lei</span>
  </button>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal"><div class="modal-handle"></div><div id="modalContent"></div></div>
</div>

<!-- Modal date facturare client -->
<div class="customer-modal-overlay" id="customerModalOverlay">
  <div class="customer-modal">
    <div class="customer-modal-handle"></div>
    <div class="customer-modal-inner">
      <div class="customer-modal-title">Date pentru factură</div>
      <div class="customer-field-row">
        <div class="customer-field">
          <label for="cf-prenume">Prenume *</label>
          <input type="text" id="cf-prenume" placeholder="ex: Ion" autocomplete="given-name">
        </div>
        <div class="customer-field">
          <label for="cf-nume">Nume *</label>
          <input type="text" id="cf-nume" placeholder="ex: Popescu" autocomplete="family-name">
        </div>
      </div>
      <div class="customer-field">
        <label for="cf-adresa">Adresă *</label>
        <input type="text" id="cf-adresa" placeholder="ex: Str. Exemplu 1, Botoșani" autocomplete="street-address">
      </div>
      <button class="customer-pay-btn" onclick="submitCustomerData()">💳 Continuă la plată</button>
      <button class="customer-back-btn" onclick="closeCustomerModal()">Înapoi</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://netopia-pay.edivacariu.workers.dev';
const cart = {};
let allDrinks = [];

const GROUPS = {
  'apa': {
    catLabel: 'Apă',
    title: 'Aqua Carpatica',
    subtitle: '0.5ml',
    imgs: ['AQUA CARPATICA 0.5l.png'],
    variants: [
      { name: 'AQUA – APA PLATA',        size: '0.5ml', img: 'AQUA - APA PLATA.png' },
      { name: 'AQUA – APA CARBOGAZOASA', size: '0.5ml', img: 'AQUA - APA CARBOGAZOASA.png' },
    ]
  },
  'pepsi-05': {
    catLabel: 'Pepsi',
    title: 'PEPSI',
    subtitle: '0.5ml',
    imgs: ['PEPSI regular 0.5ML.png'],
    variants: [
      { name: 'PEPSI regular',   size: '0.5ml', img: 'PEPSI regular 0.5ML.png' },
      { name: 'PEPSI Zero',      size: '0.5ml', img: 'PEPSI Zero 0.5ML.png' },
      { name: 'PEPSI twist',     size: '0.5ml', img: 'PEPSI twist 0.5ML.png' },
      { name: 'PEPSI Raspberry', size: '0.5ml', img: 'PEPSI Raspberry 0.5ML.png' },
    ]
  },
  'pepsi-doza': {
    catLabel: null,
    title: 'PEPSI Doză',
    subtitle: 'doză 0.33ml',
    imgs: ['PEPSI regular doză.png'],
    variants: [
      { name: 'PEPSI regular',                   size: 'doză 0.33ml', img: 'PEPSI regular doză.png' },
      { name: 'PEPSI Zero',                      size: 'doză 0.33ml', img: 'PEPSI Zero doză.png' },
      { name: 'PEPSI twist',                     size: 'doză 0.33ml', img: 'PEPSI twist doză.png' },
      { name: 'PEPSI Raspberry',                 size: 'doză 0.33ml', img: 'PEPSI Raspberry doză.png' },
      { name: 'PEPSI Zero vanilie și înghețată', size: 'doză 0.33ml', img: 'PEPSI Zero vanilie și înghețată doză.png' },
      { name: 'PEPSI Zero căpșuni și frișcă',    size: 'doză 0.33ml', img: 'PEPSI Zero căpșuni și frișcă doză.png' },
    ]
  },
  'sucuri': {
    catLabel: 'Sucuri Naturale',
    title: 'PRIGAT / LIPTON',
    subtitle: '0.5ml',
    imgs: ['LIPTON PRIGAT.png'],
    variants: [
      { name: 'PRIGAT căpșuni și banane',   size: '0.5ml', img: 'PRIGAT căpșuni și banane 0.5ML.png' },
      { name: 'PRIGAT lămâie și portocală', size: '0.5ml', img: 'PRIGAT lămâie și portocala 0.5ML.png' },
      { name: 'LIPTON lămâie',                size: '0.5ml', img: 'LIPTON lămâie 0.5ML.png' },
      { name: 'LIPTON ceai verde și căpșuni', size: '0.5ml', img: 'LIPTON ceai verde și căpșuni 0.5L.png' },
      { name: 'LIPTON portocală și mango',    size: '0.5ml', img: 'LIPTON portocală și manco 0.5L.png' },
    ]
  },
  'racoritoare': {
    catLabel: 'Alte Răcoritoare',
    title: 'Mirinda / 7UP',
    subtitle: '0.5ml',
    imgs: ['MIRINDA 7UP.png'],
    variants: [
      { name: 'MIRINDA', size: '0.5ml', img: 'MIRINDA 0.5ML.png' },
      { name: '7UP',     size: '0.5ml', img: '7UP 0.5ML.png' },
    ]
  },
};

async function loadDrinks() {
  try {
    const res = await fetch(WORKER + '/drinks');
    if (!res.ok) throw new Error();
    allDrinks = await res.json();
    renderPage();
  } catch(e) {
    document.getElementById('mainContainer').innerHTML = '<div class="empty-state">⚠️ Nu s-au putut încărca băuturile.</div>';
  }
}

function renderPage() {
  let html = '';
  const order = ['apa', 'pepsi-05', 'pepsi-doza', 'sucuri', 'racoritoare'];

  order.forEach(key => {
    const g = GROUPS[key];
    if (g.catLabel) html += `<div class="cat-label">${g.catLabel}</div>`;
    html += buildGroupCard(key);
  });

  // Individual: Mountain Dew
  const mdew = allDrinks.find(d => d.name === 'MOUNTAIN DEW' && d.active);
  if (mdew) html += buildSingleCard(mdew);

  // Individual: RockStar
  const rockstar = allDrinks.find(d => d.name === 'Energizant RockStar' && d.active);
  if (rockstar) html += buildSingleCard(rockstar);

  // Bere
  const bere = allDrinks.filter(d => d.category === 'Bere' && d.active);
  if (bere.length > 0) {
    html += `<div class="cat-label">Bere</div>`;
    bere.forEach(d => { html += buildSingleCard(d); });
  }

  // Cooler — produs unic
  const coolerDrink = allDrinks.find(d => d.category === 'Cooler' && d.active && d.stock > 0);
  if (coolerDrink) {
    html += `<div class="cat-label">Cooler</div>`;
    html += buildSingleCard({...coolerDrink, image: 'Cooler%20Afine%20sau%20Menta%20%C8%99i%20lime.png'});
  }

  // Aqua Flavours — produs unificat
  const flavours = allDrinks.filter(d => d.category === 'Aqua Flavours' && d.active);
  if (flavours.length > 0) {
    html += buildAquaFlavoursCard(flavours);
  }

  document.getElementById('mainContainer').innerHTML = html;
}

function buildGroupCard(groupKey) {
  const g = GROUPS[groupKey];
  const variants = g.variants.map(v => ({
    ...v,
    drink: allDrinks.find(d => d.name === v.name && d.size === v.size && d.active)
  })).filter(v => v.drink);

  if (variants.length === 0) return '';

  const totalInCart = variants.reduce((s, v) => s + (cart[groupKey + '-' + v.drink.id]?.qty || 0), 0);
  const imgsHtml = g.imgs.map(img =>
    `<div class="group-img"><img src="${encodeURI(img)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="emoji-fb" style="display:none">🥤</span></div>`
  ).join('');

  const prices = [...new Set(variants.map(v => v.drink.price))].sort((a,b)=>a-b);
  const priceLabel = prices.length > 1 ? `${prices[0]}–${prices[prices.length-1]} lei` : `${prices[0]} lei`;
  const toggleLabel = totalInCart > 0 ? `${totalInCart} în coș ▾` : `Alege varianta ▾`;

  const variantsHtml = variants.map(v => {
    const key = groupKey + '-' + v.drink.id;
    const qty = cart[key]?.qty || 0;
    const oos = v.drink.stock <= 0;
    const imgHtml = `<img src="${encodeURI(v.img)}" alt="${v.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="emoji-fb" style="display:none">🥤</span>`;
    const ctrl = oos
      ? `<span style="font-size:11px;color:var(--red)">Epuizat</span>`
      : qty > 0
        ? `<div class="variant-qty" id="vqty-${key}">
            <button class="vqty-btn" onclick="changeVariantQty('${key}',${v.drink.id},'${groupKey}',event,-1)">−</button>
            <span class="vqty-num">${qty}</span>
            <button class="vqty-btn plus" onclick="changeVariantQty('${key}',${v.drink.id},'${groupKey}',event,1)">+</button>
          </div>`
        : `<button class="vadd-btn" id="vqty-${key}" onclick="changeVariantQty('${key}',${v.drink.id},'${groupKey}',event,1)">+</button>`;
    return `
    <div class="variant-row${oos ? ' oos' : ''}">
      <div class="variant-img">${imgHtml}</div>
      <span class="variant-name">${v.name}</span>
      <span class="variant-price">${v.drink.price} lei</span>
      ${ctrl}
    </div>`;
  }).join('');

  return `
  <div class="group-card" id="gcard-${groupKey}">
    <div class="group-header">
      <div class="group-imgs">${imgsHtml}</div>
      <div class="group-header-info">
        <div class="group-title">${g.title}</div>
        <div class="group-subtitle">${g.subtitle}</div>
        <div class="group-price-range">${priceLabel}</div>
      </div>
      <button class="group-toggle${totalInCart > 0 ? ' has-items' : ''}" id="gtoggle-${groupKey}" onclick="toggleGroup('${groupKey}')">${toggleLabel}</button>
    </div>
    <div class="group-variants" id="gvariants-${groupKey}">${variantsHtml}</div>
  </div>`;
}

function toggleGroup(groupKey) {
  document.getElementById('gcard-' + groupKey).classList.toggle('open');
}

function changeVariantQty(key, drinkId, groupKey, event, delta) {
  event.stopPropagation();
  const drink = allDrinks.find(d => d.id == drinkId);
  if (!drink) return;
  const current = cart[key]?.qty || 0;
  const newQty = Math.max(0, Math.min(drink.stock, current + delta));
  if (newQty === 0) delete cart[key]; else cart[key] = { drink, qty: newQty };

  const el = document.getElementById('vqty-' + key);
  if (el) {
    if (newQty > 0) {
      el.outerHTML = `<div class="variant-qty" id="vqty-${key}">
        <button class="vqty-btn" onclick="changeVariantQty('${key}',${drinkId},'${groupKey}',event,-1)">−</button>
        <span class="vqty-num">${newQty}</span>
        <button class="vqty-btn plus" onclick="changeVariantQty('${key}',${drinkId},'${groupKey}',event,1)">+</button>
      </div>`;
    } else {
      el.outerHTML = `<button class="vadd-btn" id="vqty-${key}" onclick="changeVariantQty('${key}',${drinkId},'${groupKey}',event,1)">+</button>`;
    }
  }

  const total = Object.entries(cart).filter(([k]) => k.startsWith(groupKey + '-')).reduce((s,[,v]) => s + v.qty, 0);
  const btn = document.getElementById('gtoggle-' + groupKey);
  if (btn) { btn.textContent = total > 0 ? `${total} în coș ▾` : `Alege varianta ▾`; btn.classList.toggle('has-items', total > 0); }
  updateCartUI();
}

// ── CART ──────────────────────────────────────────────────────
function getCartItems() { return Object.values(cart); }
function getTotal() { return getCartItems().reduce((s, e) => s + e.drink.price * e.qty, 0); }
function getCount() { return getCartItems().reduce((s, e) => s + e.qty, 0); }
function updateCartUI() {
  const total = getTotal(), count = getCount(), has = count > 0;
  document.getElementById('stickyBar').classList.toggle('visible', has);
  document.getElementById('payBtnText').textContent = `Plătește ${total} lei`;
  document.getElementById('cartBtn').classList.toggle('hidden', !has);
  document.getElementById('cartCount').textContent = count;
}

// ── MODAL ─────────────────────────────────────────────────────
function openCartModal() {
  const items = getCartItems(), total = getTotal();
  const lines = items.map(e => `
    <div class="order-line">
      <span style="flex:1">${e.drink.name} <span style="color:var(--text-muted);font-size:12px">${e.drink.size}</span></span>
      <span class="order-qty">×${e.qty}</span>
      <span class="order-price">${e.drink.price * e.qty} lei</span>
    </div>`).join('');
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-inner">
      <div class="modal-title">Comandă ta</div>
      <div class="modal-sub">Verifică înainte de plată</div>
      ${lines}
      <div class="total-line"><span>Total</span><span class="total-amount">${total} lei</span></div>
      <button class="modal-pay-btn" onclick="processPayment()">💳 Plătește ${total} lei</button>
      <button class="modal-cancel-btn" onclick="closeModal()">Înapoi</button>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

// ── CUSTOMER DATA (localStorage, 1 an) ───────────────────────
const LS_KEY = 'enjoypadel_customer';
const LS_TTL = 365 * 24 * 60 * 60 * 1000; // 1 an în ms

function getCustomerData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    const { data, expires } = JSON.parse(raw);
    if (Date.now() > expires) { localStorage.removeItem(LS_KEY); return null; }
    return data; // { prenume, nume, adresa }
  } catch(e) { return null; }
}

function saveCustomerData(data) {
  localStorage.setItem(LS_KEY, JSON.stringify({
    data,
    expires: Date.now() + LS_TTL
  }));
}

// ── MODAL DATE CLIENT ─────────────────────────────────────────
function openCustomerModal() {
  // Pre-completează dacă există date salvate
  const saved = getCustomerData();
  if (saved) {
    document.getElementById('cf-prenume').value = saved.prenume || '';
    document.getElementById('cf-nume').value = saved.nume || '';
    document.getElementById('cf-adresa').value = saved.adresa || '';
  }
  // Curăță erorile
  ['cf-prenume','cf-nume','cf-adresa'].forEach(id => document.getElementById(id).classList.remove('error'));
  document.getElementById('customerModalOverlay').classList.add('open');
}

function closeCustomerModal() {
  document.getElementById('customerModalOverlay').classList.remove('open');
}

function submitCustomerData() {
  const prenume = document.getElementById('cf-prenume').value.trim();
  const nume    = document.getElementById('cf-nume').value.trim();
  const adresa  = document.getElementById('cf-adresa').value.trim();
  let valid = true;
  if (!prenume) { document.getElementById('cf-prenume').classList.add('error'); valid = false; }
  else document.getElementById('cf-prenume').classList.remove('error');
  if (!nume)    { document.getElementById('cf-nume').classList.add('error'); valid = false; }
  else document.getElementById('cf-nume').classList.remove('error');
  if (!adresa)  { document.getElementById('cf-adresa').classList.add('error'); valid = false; }
  else document.getElementById('cf-adresa').classList.remove('error');
  if (!valid) return;

  saveCustomerData({ prenume, nume, adresa });
  closeCustomerModal();
  doProcessPayment({ prenume, nume, adresa });
}

// ── PAYMENT ───────────────────────────────────────────────────
function processPayment() {
  // Dacă avem deja datele salvate, mergem direct la plată
  const customer = getCustomerData();
  if (customer) {
    doProcessPayment(customer);
  } else {
    // Deschide mai întâi modalul de date client
    closeModal();
    openCustomerModal();
  }
}

async function doProcessPayment(customer) {
  // Expandam aqua-flavours virtual in ID-uri reale (distribuim cantitatea pe produsele cu stoc)
  const rawItems = getCartItems();
  const items = [];
  for (const e of rawItems) {
    if (e.drink.id === 'aqua-flavours') {
      // Distribuim cantitatea pe aromele disponibile in ordine
      const flavours = allDrinks.filter(d => d.category === 'Aqua Flavours' && d.active && d.stock > 0);
      let remaining = e.qty;
      for (const f of flavours) {
        if (remaining <= 0) break;
        const take = Math.min(remaining, f.stock);
        items.push({ id: f.id, quantity: take });
        remaining -= take;
      }
    } else {
      items.push({ id: e.drink.id, quantity: e.qty });
    }
  }
  const total = getTotal();

  // Afișăm spinner în modalul coș (dacă e deschis) sau direct
  const modalContent = document.getElementById('modalContent');
  const modalOverlay = document.getElementById('modalOverlay');
  modalOverlay.classList.add('open');
  modalContent.innerHTML = `
    <div class="modal-inner" style="text-align:center;padding:40px 0">
      <div class="spinner" style="margin:0 auto 16px"></div>
      <div style="font-size:15px;color:var(--text-muted)">Se procesează plata...</div>
    </div>`;

  try {
    const res = await fetch(WORKER + '/drinks-pay', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items, total, customer })
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Eroare server'); }
    const pay = await res.json();
    if (pay.envKey && pay.data) {
      const form = document.createElement('form');
      form.method = 'POST'; form.action = pay.payUrl; form.style.display = 'none';
      [['env_key', pay.envKey], ['data', pay.data], ['cipher', 'rc4']].forEach(([n, v]) => {
        const i = document.createElement('input'); i.type = 'hidden'; i.name = n; i.value = v;
        form.appendChild(i);
      });
      document.body.appendChild(form); form.submit();
    }
  } catch(e) {
    modalContent.innerHTML = `
      <div class="modal-inner" style="text-align:center;padding:20px 0">
        <div style="font-size:40px;margin-bottom:12px">⚠️</div>
        <div style="font-size:17px;font-weight:700;margin-bottom:8px">Eroare</div>
        <div style="font-size:14px;color:var(--text-muted);margin-bottom:20px">${e.message}</div>
        <button class="modal-cancel-btn" onclick="closeModal()">Închide</button>
      </div>`;
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeCustomerModal(); }
});
loadDrinks();
