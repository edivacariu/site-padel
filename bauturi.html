<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Băuturi — EnjoyPadel</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding-bottom: 120px; }
  .container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 1rem; }
  .page-header { margin-bottom: 1.5rem; }
  .page-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .page-header p { font-size: 14px; color: #888; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: #999; text-transform: uppercase; padding: 4px 0 8px; margin-top: 16px; }
  .section-label:first-of-type { margin-top: 0; }

  /* AQUA FLAVOURS group */
  .flavours-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
  .flavours-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .flavours-img { width: 68px; height: 68px; border-radius: 8px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
  .flavours-img img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }
  .flavours-title { font-size: 15px; font-weight: 600; }
  .flavours-sub { font-size: 13px; color: #888; margin-top: 2px; }
  .flavours-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .flavour-row { display: flex; align-items: center; justify-content: space-between; background: #f9f9f9; border-radius: 8px; padding: 8px 10px; }
  .flavour-name { font-size: 13px; font-weight: 500; color: #111; }
  .flavour-price { font-size: 12px; color: #1a9e5c; font-weight: 600; margin-top: 1px; }
  .qty-ctrl { display: flex; align-items: center; gap: 6px; }
  .qty-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #111; font-weight: 600; flex-shrink: 0; }
  .qty-btn:hover { background: #f0f0f0; }
  .qty-num { font-size: 14px; font-weight: 700; min-width: 18px; text-align: center; }

  /* Regular item card */
  .item-card { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: #fff; border: 1px solid #eee; border-radius: 12px; margin-bottom: 10px; }
  .item-card.out-of-stock { opacity: 0.45; pointer-events: none; }
  .item-img { width: 64px; height: 64px; border-radius: 8px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
  .item-img img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }
  .item-img .emoji { font-size: 30px; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 600; color: #111; }
  .item-size { font-size: 12px; color: #aaa; margin-top: 1px; }
  .item-price { font-size: 14px; font-weight: 600; color: #1a9e5c; margin-top: 3px; }
  .item-stock-low { font-size: 11px; color: #e67e22; margin-top: 2px; }
  .item-stock-out { font-size: 11px; color: #ccc; margin-top: 2px; }

  /* CART BAR */
  .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #eee; padding: 12px 16px; z-index: 200; transform: translateY(100%); transition: transform 0.3s; }
  .cart-bar.visible { transform: translateY(0); }
  .cart-bar-inner { max-width: 680px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .cart-summary { font-size: 14px; color: #888; }
  .cart-summary strong { color: #111; font-size: 16px; }
  .cart-items-count { font-size: 12px; color: #888; margin-top: 2px; }
  .btn-pay { padding: 13px 24px; background: #1a9e5c; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
  .btn-pay:hover { background: #158a4f; }
  .btn-clear { padding: 10px; background: #f5f5f5; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; color: #888; font-size: 13px; font-family: inherit; }
  .btn-clear:hover { background: #ebebeb; }

  /* DRAWER */
  .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; align-items: flex-end; justify-content: center; }
  .drawer-overlay.open { display: flex; }
  .drawer { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 680px; padding: 20px; max-height: 90vh; overflow-y: auto; }
  .drawer-handle { width: 36px; height: 4px; border-radius: 2px; background: #ddd; margin: 0 auto 20px; }
  .drawer-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .cart-item-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
  .cart-item-row:last-of-type { border-bottom: none; }
  .cart-item-img { width: 44px; height: 44px; border-radius: 6px; background: #f5f5f5; overflow: hidden; flex-shrink: 0; }
  .cart-item-img img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
  .cart-item-name { flex: 1; font-size: 14px; font-weight: 500; }
  .cart-item-size { font-size: 12px; color: #aaa; }
  .cart-item-price { font-size: 14px; font-weight: 600; color: #1a9e5c; white-space: nowrap; }
  .cart-total-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 4px; font-size: 16px; font-weight: 700; }
  .drawer-actions { display: flex; gap: 10px; margin-top: 16px; }
  .drawer-actions button { flex: 1; padding: 13px; font-size: 15px; border-radius: 8px; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; border: none; font-weight: 500; }
  .da-cancel { background: #f5f5f5; border: 1px solid #ddd !important; color: #111; }
  .da-confirm { background: #1a9e5c; color: #fff; }

  .success-screen { text-align: center; padding: 16px 0; }
  .success-icon { font-size: 52px; margin-bottom: 12px; }
  .success-screen h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .success-screen p { font-size: 14px; color: #888; line-height: 1.6; }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #0e1117; color: #fff; padding: 11px 22px; border-radius: 8px; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 400; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-placeholder { background: #eee; border-radius: 12px; height: 80px; margin-bottom: 10px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <h1>🥤 Băuturi & Răcoritoare</h1>
    <p>Alege produsele dorite și achită online — ridici imediat de la frigider.</p>
  </div>
  <div id="drinks-list">
    <div class="loading-placeholder"></div>
    <div class="loading-placeholder"></div>
    <div class="loading-placeholder"></div>
  </div>
</div>

<!-- CART BAR -->
<div class="cart-bar" id="cart-bar">
  <div class="cart-bar-inner">
    <div>
      <div class="cart-summary"><strong id="cart-total-display">0 lei</strong></div>
      <div class="cart-items-count" id="cart-items-display"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-clear" onclick="clearCart()">Golește</button>
      <button class="btn-pay" onclick="openCartDrawer()">
        <i class="ti ti-credit-card"></i> Achită
      </button>
    </div>
  </div>
</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawerOutside(event)">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div id="drawer-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL = 'https://netopia-pay.edivacariu.workers.dev';

let allDrinks = [];
let cart = {}; // {drinkId: quantity}

// ---- LOAD DRINKS ----
async function loadDrinks() {
  try {
    const res = await fetch(WORKER_URL + '/drinks');
    allDrinks = await res.json();
    renderDrinks();
  } catch(e) {
    document.getElementById('drinks-list').innerHTML = '<p style="color:#888;text-align:center;padding:40px 0">Eroare la încărcare. Reîncarcă pagina.</p>';
  }
}

function groupBy(arr, key) {
  return arr.reduce((acc, item) => {
    (acc[item[key]] = acc[item[key]] || []).push(item);
    return acc;
  }, {});
}

function renderDrinks() {
  const grouped = groupBy(allDrinks, 'category');
  const categoryOrder = ['Pepsi', 'Alte răcoritoare', 'Sucuri naturale', 'Ice Tea', 'Apă', 'Aqua Flavours'];
  
  let html = '';
  
  for (const cat of categoryOrder) {
    if (!grouped[cat]) continue;
    const items = grouped[cat];
    
    html += `<div class="section-label">${cat}</div>`;
    
    if (cat === 'Aqua Flavours') {
      // Card special cu toate aromele
      html += `
        <div class="flavours-card">
          <div class="flavours-header">
            <div class="flavours-img">
              <img src="AQUA Carpatica FLAVOURS.png" alt="Aqua Flavours" onerror="this.style.display='none';this.parentElement.innerHTML='<span style=font-size:30px>💧</span>'">
            </div>
            <div>
              <div class="flavours-title">AQUA Carpatica FLAVOURS</div>
              <div class="flavours-sub">Doză 0.33ml · 7 lei / bucată</div>
            </div>
          </div>
          <div class="flavours-grid">
            ${items.map(d => {
              const flavor = d.name.replace('AQUA Carpatica FLAVOURS – ', '');
              const qty = cart[d.id] || 0;
              const outOfStock = d.stock <= 0;
              return `
                <div class="flavour-row${outOfStock ? ' out-of-stock' : ''}">
                  <div>
                    <div class="flavour-name">${flavor}</div>
                    <div class="flavour-price">${outOfStock ? 'Stoc epuizat' : d.price + ' lei'}</div>
                  </div>
                  <div class="qty-ctrl">
                    <button class="qty-btn" onclick="changeQty(${d.id}, -1)" ${qty === 0 ? 'disabled style="opacity:0.3"' : ''}>−</button>
                    <span class="qty-num">${qty}</span>
                    <button class="qty-btn" onclick="changeQty(${d.id}, 1)" ${outOfStock || qty >= d.stock ? 'disabled style="opacity:0.3"' : ''}>+</button>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    } else {
      // Carduri normale
      items.forEach(d => {
        const qty = cart[d.id] || 0;
        const outOfStock = d.stock <= 0;
        const stockLow = d.stock > 0 && d.stock <= 3;
        
        html += `
          <div class="item-card${outOfStock ? ' out-of-stock' : ''}" id="card-${d.id}">
            <div class="item-img">
              <img src="${d.image}" alt="${d.name}" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=emoji>🥤</span>'">
            </div>
            <div class="item-info">
              <div class="item-name">${d.name}</div>
              <div class="item-size">${d.size}</div>
              <div class="item-price">${d.price} lei</div>
              ${stockLow ? `<div class="item-stock-low">Doar ${d.stock} rămase</div>` : ''}
              ${outOfStock ? `<div class="item-stock-out">Stoc epuizat</div>` : ''}
            </div>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty(${d.id}, -1)" ${qty === 0 ? 'disabled style="opacity:0.3"' : ''}>−</button>
              <span class="qty-num" id="qty-${d.id}">${qty}</span>
              <button class="qty-btn" onclick="changeQty(${d.id}, 1)" ${outOfStock || qty >= d.stock ? 'disabled style="opacity:0.3"' : ''}>+</button>
            </div>
          </div>
        `;
      });
    }
  }
  
  document.getElementById('drinks-list').innerHTML = html;
}

function changeQty(id, delta) {
  const drink = allDrinks.find(d => d.id === id);
  if (!drink) return;
  
  const current = cart[id] || 0;
  const newQty = Math.max(0, Math.min(drink.stock, current + delta));
  
  if (newQty === 0) delete cart[id];
  else cart[id] = newQty;
  
  updateCartBar();
  renderDrinks();
}

function getCartTotal() {
  return Object.entries(cart).reduce((total, [id, qty]) => {
    const drink = allDrinks.find(d => d.id === parseInt(id));
    return total + (drink ? drink.price * qty : 0);
  }, 0);
}

function getCartItemCount() {
  return Object.values(cart).reduce((a, b) => a + b, 0);
}

function updateCartBar() {
  const total = getCartTotal();
  const count = getCartItemCount();
  const bar = document.getElementById('cart-bar');
  
  if (count === 0) {
    bar.classList.remove('visible');
  } else {
    bar.classList.add('visible');
    document.getElementById('cart-total-display').textContent = total + ' lei';
    document.getElementById('cart-items-display').textContent = count + ' produs' + (count !== 1 ? 'e' : '') + ' selectat' + (count !== 1 ? 'e' : '');
  }
}

function clearCart() {
  cart = {};
  updateCartBar();
  renderDrinks();
}

function openCartDrawer() {
  const items = Object.entries(cart).map(([id, qty]) => {
    const drink = allDrinks.find(d => d.id === parseInt(id));
    return { ...drink, qty };
  });
  
  const total = getCartTotal();
  
  const itemsHtml = items.map(item => `
    <div class="cart-item-row">
      <div class="cart-item-img">
        <img src="${item.image}" alt="${item.name}" onerror="this.style.display='none'">
      </div>
      <div style="flex:1;min-width:0">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-size">${item.size} × ${item.qty}</div>
      </div>
      <div class="cart-item-price">${item.price * item.qty} lei</div>
    </div>
  `).join('');
  
  document.getElementById('drawer-content').innerHTML = `
    <div class="drawer-title">Rezumatul comenzii</div>
    ${itemsHtml}
    <div class="cart-total-row">
      <span>Total</span>
      <span style="color:#1a9e5c">${total} lei</span>
    </div>
    <div style="font-size:13px;color:#888;margin-bottom:4px">După achitare, ridici băuturile de la frigider.</div>
    <div class="drawer-actions">
      <button class="da-cancel" onclick="closeDrawer()"><i class="ti ti-x"></i> Înapoi</button>
      <button class="da-confirm" onclick="processOrder()"><i class="ti ti-credit-card"></i> Achită ${total} lei</button>
    </div>
  `;
  
  document.getElementById('drawer-overlay').classList.add('open');
}

async function processOrder() {
  const btn = document.querySelector('.da-confirm');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; }
  
  const items = Object.entries(cart).map(([id, quantity]) => ({ id: parseInt(id), quantity }));
  
  try {
    const res = await fetch(WORKER_URL + '/drinks-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items })
    });
    const data = await res.json();
    
    if (data.success) {
      // TODO: redirect Netopia pentru plata reala
      // Deocamdata simulam succes
      document.getElementById('drawer-content').innerHTML = `
        <div class="success-screen">
          <div class="success-icon">✅</div>
          <h3>Comandă confirmată!</h3>
          <p>Poți ridica băuturile imediat de la frigider.<br>Bucură-te de meci! 🎾</p>
          <button class="btn-pay" style="margin:24px auto 0;justify-content:center" onclick="closeDrawer();clearCart()">
            <i class="ti ti-check"></i> Închide
          </button>
        </div>
      `;
    } else {
      showToast('⚠️ ' + (data.error || 'Eroare la comandă'));
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-credit-card"></i> Achită'; }
      loadDrinks(); // reincarca stocul
    }
  } catch(e) {
    showToast('⚠️ Eroare de conexiune');
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-credit-card"></i> Achită'; }
  }
}

function closeDrawer() { document.getElementById('drawer-overlay').classList.remove('open'); }
function closeDrawerOutside(e) { if (e.target === document.getElementById('drawer-overlay')) closeDrawer(); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

loadDrinks();
</script>
</body>
</html>
