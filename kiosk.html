<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosk — EnjoyPadel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0fdf4;
    display: flex;
    overflow: hidden;
  }

  /* ── LEFT ── */
  .left {
    width: 42%;
    background: #fefce8;
    border-right: 3px solid #e2e8f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    gap: 28px;
  }

  .brand { font-size: 40px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; color: #0e1117; }
  .brand-sub { font-size: 14px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: #bbb; margin-top: -20px; }

  .qr-box {
    background: #fff;
    border: 5px solid #0e1117;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  }

  .scan-label {
    font-size: 52px;
    font-weight: 900;
    color: #0e1117;
    text-align: center;
    line-height: 1.1;
    letter-spacing: -1.5px;
  }

  .scan-label span { color: #22c55e; }

  .scan-sub { font-size: 18px; color: #999; text-align: center; line-height: 1.5; }

  /* ── RIGHT ── */
  .right {
    width: 58%;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    justify-content: center;
  }

  .section-label {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #aaa;
    text-transform: uppercase;
    margin-bottom: -4px;
    margin-top: 8px;
  }

  .item-card {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 20px 24px;
    background: #fff;
    border: 2px solid #e2e8f0;
    border-radius: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .item-img {
    width: 96px;
    height: 96px;
    border-radius: 12px;
    background: #f5f7fa;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }

  .item-img img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
  .item-img .emoji { font-size: 48px; }

  .item-info { flex: 1; }

  .item-name {
    font-size: 28px;
    font-weight: 800;
    color: #0e1117;
    margin-bottom: 6px;
    line-height: 1.1;
  }

  .item-tag {
    font-size: 18px;
    color: #888;
    margin-bottom: 0;
  }

  .badge {
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 22px;
    font-weight: 800;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-green { background: #dcfce7; color: #15803d; }
  .badge-blue  { background: #dbeafe; color: #1d4ed8; }
  .badge-amber { background: #fef3c7; color: #92400e; }
</style>
</head>
<body>

<!-- LEFT -->
<div class="left">
  <div class="brand">ENJOY PADEL</div>
  <div class="brand-sub">Botoșani</div>

  <div class="qr-box">
    <div id="qrcode"></div>
  </div>

  <div class="scan-label">Scanează<br>pentru <span>Echipament</span></div>
  <div class="scan-sub">Folosește camera telefonului</div>
</div>

<!-- RIGHT -->
<div class="right">

  <div class="section-label">Palete standard</div>

  <div class="item-card">
    <div class="item-img">
      <img src="paleta-black-crown-viva.png" alt="Black Crown VIVA" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span class="emoji" style="display:none">🏓</span>
    </div>
    <div class="item-info">
      <div class="item-name">Black Crown VIVA</div>
      <div class="item-tag">Adulți · Bărbați</div>
    </div>
    <div class="badge badge-green">GRATUIT</div>
  </div>

  <div class="item-card">
    <div class="item-img">
      <img src="paleta-vibor-a-titan-junior.png" alt="Vibor-A Titan Junior" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span class="emoji" style="display:none">🏓</span>
    </div>
    <div class="item-info">
      <div class="item-name">Vibor-A Titan Junior</div>
      <div class="item-tag">Copii · Femei</div>
    </div>
    <div class="badge badge-green">GRATUIT</div>
  </div>

  <div class="item-card">
    <div class="item-img">
      <img src="paleta-adidas-match-black.png" alt="adidas MATCH BLACK" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span class="emoji" style="display:none">🎾</span>
    </div>
    <div class="item-info">
      <div class="item-name">adidas MATCH BLACK</div>
      <div class="item-tag">Premium · Adulți</div>
    </div>
    <div class="badge badge-blue">15 LEI</div>
  </div>

  <div class="section-label" style="margin-top:4px">Mingi</div>

  <div class="item-card">
    <div class="item-img">
      <img src="set-mingi-black-crown.png" alt="Set mingi" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span class="emoji" style="display:none">🎱</span>
    </div>
    <div class="item-info">
      <div class="item-name">Set mingi Black Crown 1+1</div>
      <div class="item-tag">2 tuburi · 3 mingi fiecare</div>
    </div>
    <div class="badge badge-amber">50 LEI</div>
  </div>

</div>

<script>
  new QRCode(document.getElementById('qrcode'), {
    text: 'https://enjoypadel.ro/echipament.html',
    width: 280,
    height: 280,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
</script>

</body>
</html>
