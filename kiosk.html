<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosk — EnjoyPadel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)),
      url('./hero.png') center center / cover no-repeat;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(16px);
    border-radius: 24px;
    padding: 48px 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
  }

  .logo {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .sub {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 32px;
  }

  .qr-wrap {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    display: inline-block;
    margin-bottom: 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .label {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }

  .desc {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
  }

  .accent { color: #22c55e; }

  .arrow {
    font-size: 32px;
    margin-bottom: 16px;
    animation: bounce 1.5s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">ENJOY PADEL</div>
  <div class="sub">Botoșani</div>

  <div class="qr-wrap">
    <div id="qrcode"></div>
  </div>

  <div class="arrow">👆</div>
  <div class="label">Scanează pentru <span class="accent">Echipament</span></div>
  <div class="desc">Închiriază palete, mingi și alte echipamente direct de pe telefon.</div>
</div>

<script>
  new QRCode(document.getElementById('qrcode'), {
    text: 'https://enjoypadel.ro/echipament.html',
    width: 220,
    height: 220,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
</script>

</body>
</html>
